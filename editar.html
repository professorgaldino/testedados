<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Editar Alunos - Debug</title>
<style>
body { font-family: Arial; background: #f4f4f4; padding: 20px; }
.container { max-width: 800px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; }
input, button { width: 100%; padding: 10px; margin-bottom: 10px; }
button { background: #4CAF50; color: white; border: none; cursor: pointer; }
button:hover { opacity: 0.9; }
.foto { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; cursor: pointer; }
.sem-foto { width: 80px; height: 80px; border-radius: 50%; background: #eee; display: flex; align-items: center; justify-content: center; font-size: 28px; color: red; font-weight: bold; }
.popup { display: none; position: fixed; z-index: 999; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; }
.popup img { max-width: 95vw; max-height: 95vh; object-fit: contain; border-radius: 8px; }
.fechar { position: absolute; top:15px; right:25px; color:white; font-size:28px; font-weight:bold; cursor:pointer; opacity:0.7; }
.fechar:hover { opacity:1; }
pre { background: #eee; padding: 10px; border-radius: 6px; max-height: 300px; overflow-y: auto; }
</style>
</head>
<body>

<div class="container">
  <h2>📝 Editar Alunos - 5</h2>

  <input type="text" id="busca" placeholder="Pesquisar por RA, Nome ou Sala">
  <button onclick="buscarAluno()">Buscar</button>

  <form id="formulario">
    <label>Data</label><input type="text" id="data" readonly>
    <label>RA</label><input type="text" id="ra">
    <label>Nome</label><input type="text" id="nome">
    <label>Data de Nascimento</label><input type="date" id="nascimento">
    <label>Foto (ID do Google Drive)</label><input type="text" id="foto">
    <div id="mostraFoto"></div>
    <label>Sala</label><input type="text" id="sala">
    <label>Tutor</label><input type="text" id="tutor">
    <label>Eletiva 1</label><input type="text" id="eletiva1">
    <label>Eletiva 2</label><input type="text" id="eletiva2">
    <button type="button" onclick="salvar()">Salvar</button>
  </form>

  <div id="msg"></div>

  <h3>🛠 Debug:</h3>
  <div>JSON completo recebido:</div>
  <pre id="debugJson"></pre>
  <div>Resultado da pesquisa:</div>
  <pre id="debugBusca"></pre>
</div>

<!-- POPUP -->
<div id="popup" class="popup" onclick="fecharPopup(event)">
  <span class="fechar" onclick="fecharPopup(event)">×</span>
  <img id="imgPopup">
</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbxXnCBxqUpL-xQJTbXd5oVwPFBOGLBQ87-06FtWAh2MU-J3m3B9jrgJw_fd2DcTMkWHeQ/exec";
let dados = [];

// carregar dados
fetch(url)
  .then(r => r.json())
  .then(data => {
    dados = data;
    document.getElementById("debugJson").innerText = JSON.stringify(dados, null, 2);
  });

// montar foto
function montarFoto(id) {
  if (!id) return null;
  id = String(id).trim();
  if (id.length < 10) return null;
  return "https://drive.google.com/uc?export=view&id=" + id;
}

// busca aluno
function buscarAluno() {
  const valor = document.getElementById("busca").value.toLowerCase().trim();

  const alunosEncontrados = dados.filter(a => {
    const ra = String(a.ra || "").toLowerCase();
    const nome = String(a.nome || "").toLowerCase();
    const sala = String(a.sala || "").toLowerCase();
    return ra.includes(valor) || nome.includes(valor) || sala.includes(valor);
  });

  document.getElementById("debugBusca").innerText = JSON.stringify(alunosEncontrados, null, 2);

  const msg = document.getElementById("msg");
  msg.innerHTML = "";

  if (alunosEncontrados.length === 0) {
    msg.innerHTML = "❌ Aluno não encontrado";
    document.getElementById("formulario").reset();
    document.getElementById("mostraFoto").innerHTML = "";
    return;
  }

  // pegar o primeiro aluno encontrado
  const aluno = alunosEncontrados[0];

  document.getElementById("data").value = aluno.data || "";
  document.getElementById("ra").value = aluno.ra || "";
  document.getElementById("nome").value = aluno.nome || "";
  document.getElementById("nascimento").value = aluno.nascimento ? aluno.nascimento.substr(0,10) : "";
  document.getElementById("foto").value = aluno.foto || "";
  document.getElementById("sala").value = aluno.sala || "";
  document.getElementById("tutor").value = aluno.tutor || "";
  document.getElementById("eletiva1").value = aluno.eletiva1 || "";
  document.getElementById("eletiva2").value = aluno.eletiva2 || "";

  const fotoURL = montarFoto(aluno.foto);
  const divFoto = document.getElementById("mostraFoto");
  if (fotoURL) {
    divFoto.innerHTML = `<img class="foto" src="${fotoURL}" onclick="abrirPopup('${fotoURL}')">`;
  } else {
    divFoto.innerHTML = `<div class="sem-foto">❌</div>`;
  }
}

// salvar alterações
function salvar() {
  const data = {
    data: document.getElementById("data").value,
    ra: document.getElementById("ra").value,
    nome: document.getElementById("nome").value,
    nascimento: document.getElementById("nascimento").value,
    foto: document.getElementById("foto").value,
    sala: document.getElementById("sala").value,
    tutor: document.getElementById("tutor").value,
    eletiva1: document.getElementById("eletiva1").value,
    eletiva2: document.getElementById("eletiva2").value
  };

  fetch(url, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(r => r.text())
  .then(res => {
    document.getElementById("msg").innerHTML = "✅ Dados salvos";
    const index = dados.findIndex(a => String(a.ra) === String(data.ra));
    if (index !== -1) dados[index] = data;
    document.getElementById("debugJson").innerText = JSON.stringify(dados, null, 2);
  })
  .catch(err => {
    document.getElementById("msg").innerHTML = "❌ Erro ao salvar";
    console.error(err);
  });
}

// popup
function abrirPopup(src) {
  document.getElementById("popup").style.display = "flex";
  document.getElementById("imgPopup").src = src;
}
function fecharPopup(e) {
  if (e.target.tagName === "IMG") return;
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
