<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Editar Alunos 36</title>

<style>
body { font-family: Arial; padding: 20px; }
input, button { padding:10px; margin:5px 0; width:100%; }

.lista {
  border:1px solid #ccc;
  max-height:200px;
  overflow:auto;
}

.item {
  padding:8px;
  cursor:pointer;
  border-bottom:1px solid #eee;
}

.item:hover {
  background:#f0f0f0;
}

.hidden { display:none; }
</style>
</head>

<body>

<h2>Editar Aluno</h2>

<input type="text" id="busca" placeholder="Digite nome ou RA">
<button onclick="buscar()">Buscar</button>

<div id="lista" class="lista"></div>

<hr>

<div id="form" class="hidden">

<input id="ra">
<input id="nome">
<input id="nascimento" type="date">
<input id="foto">
<input id="sala">
<input id="tutor">
<input id="eletiva1">
<input id="eletiva2">

<button onclick="salvar()">Salvar</button>

</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbxMg4BYeW7hBpCdpmQleD3pllaVtAy64h6KAWHUJDC5ZVxAHrLkAE1CAjMQdJZS2Vwg8A/exec";

let alunoOriginal = null;

function buscar() {
  const valor = document.getElementById("busca").value;

  fetch(url + "?busca=" + valor)
  .then(r => r.json())
  .then(lista => {
    const div = document.getElementById("lista");
    div.innerHTML = "";

    if (lista.length === 0) {
      div.innerHTML = "Nenhum encontrado";
      return;
    }

    lista.forEach(a => {
      const el = document.createElement("div");
      el.className = "item";
      el.innerText = a.nome + " (RA: " + a.ra + ")";

      el.onclick = () => selecionar(a);

      div.appendChild(el);
    });
  });
}

function selecionar(a) {
  alunoOriginal = {...a};

  document.getElementById("form").classList.remove("hidden");

  ra.value = a.ra;
  nome.value = a.nome;
  nascimento.value = a.nascimento?.split("T")[0] || "";
  foto.value = a.foto || "";
  sala.value = a.sala || "";
  tutor.value = a.tutor || "";
  eletiva1.value = a.eletiva1 || "";
  eletiva2.value = a.eletiva2 || "";
}

function salvar() {
  if (!alunoOriginal) return;

  const novo = {
    ra: ra.value,
    nome: nome.value,
    nascimento: nascimento.value,
    foto: foto.value,
    sala: sala.value,
    tutor: tutor.value,
    eletiva1: eletiva1.value,
    eletiva2: eletiva2.value
  };

  // 🔥 CONFIRMAÇÃO
  let confirmacao = "Confirme alterações:\n\n";

  for (let k in novo) {
    if (novo[k] != alunoOriginal[k]) {
      confirmacao += k + ": " + alunoOriginal[k] + " → " + novo[k] + "\n";
    }
  }

  if (!confirm(confirmacao)) return;

  fetch(url, {
    method:"POST",
    body: JSON.stringify({
      ...novo,
      raOriginal: alunoOriginal.ra
    })
  })
  .then(() => {
    alert("Salvo com sucesso");
    buscar();
  });
}
</script>

</body>
</html>
