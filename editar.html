<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Editar Alunos</title>
<style>
body { font-family: Arial; background: #f4f4f4; padding: 20px; }
.container { max-width: 700px; margin: auto; background: #fff; padding: 20px; border-radius: 10px; }
input, button { width: 100%; padding: 10px; margin-bottom: 10px; }
button { background: #4CAF50; color: white; border: none; cursor: pointer; }
h2 { text-align: center; }
label { font-weight: bold; }
.debug { background: #eee; padding: 10px; margin-top: 10px; border-radius: 5px; font-family: monospace; white-space: pre-wrap; }

/* 🔥 POPUP FOTO */
.popup {
  display: none;
  position: fixed;
  z-index: 999;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  justify-content: center;
  align-items: center;
}
.popup img {
  max-width: 95vw;
  max-height: 95vh;
  object-fit: contain;
  border-radius: 8px;
}
.fechar {
  position: absolute;
  top: 15px;
  right: 25px;
  color: white;
  font-size: 28px;
  font-weight: bold;
  cursor: pointer;
  opacity: 0.7;
}
.fechar:hover { opacity: 1; }

/* FOTO PEQUENA NO FORMULÁRIO */
.foto-aluno {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  object-fit: cover;
  cursor: pointer;
  border: 2px solid #ccc;
  display: block;
  margin-bottom: 10px;
}
.sem-foto {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: #eee;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  color: red;
  font-weight: bold;
  margin-bottom: 10px;
}
</style>
</head>
<body>

<div class="container">
  <h2>✏️ Editar Alunos 9</h2>

  <input type="text" id="busca" placeholder="Digite RA ou Nome">
  <button onclick="buscar()">Buscar</button>

  <div id="formulario">
    <label>RA</label>
    <input type="text" id="ra" disabled>
    <label>Nome</label>
    <input type="text" id="nome">
    <label>Data de Nascimento</label>
    <input type="date" id="nascimento">

    <label>Foto</label>
    <div id="foto-container">
      <img id="fotoAluno" class="foto-aluno" onclick="abrirPopupFoto()" style="display:none;">
      <div id="semFoto" class="sem-foto" style="display:none;">❌</div>
    </div>
    <input type="text" id="foto" placeholder="ID do Google Drive">

    <label>Sala</label>
    <input type="text" id="sala">
    <label>Tutor</label>
    <input type="text" id="tutor">
    <label>Eletiva 1° Semestre</label>
    <input type="text" id="eletiva1">
    <label>Eletiva 2° Semestre</label>
    <input type="text" id="eletiva2">
    <button onclick="salvar()">💾 Salvar Alterações</button>
  </div>

  <div class="debug" id="debug">⚠️ Nenhum aluno carregado ainda</div>
</div>

<!-- POPUP FOTO -->
<div id="popup" class="popup" onclick="fecharPopup(event)">
  <span class="fechar" onclick="fecharPopup(event)">×</span>
  <img id="imgPopup">
</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbxxbE3LiV3p2hPIegaqyqadlOzUqCwWkJDRHbKhkcR7sTyWX6VqWZ-5m577AB1ictRYVg/exec";

let dados = [];
let alunoAtual = null;

// 🔥 carregar dados
fetch(url)
  .then(res => res.json())
  .then(data => {
    dados = data;
    document.getElementById('debug').innerText = "✅ Dados carregados:\n" + JSON.stringify(dados, null, 2);
  });

// 🔥 montar foto (Google Drive) usando lh3
function montarFoto(id) {
  if (!id) return null;
  id = String(id).trim();
  if (id.length < 10) return null;
  return "https://lh3.googleusercontent.com/d/" + id;
}

// 🔥 buscar aluno por RA ou Nome
function buscar() {
  const valor = document.getElementById('busca').value.toString().trim().toLowerCase();
  alunoAtual = dados.find(a => {
    const raStr = (a.ra || "").toString().trim().toLowerCase();
    const nomeStr = (a.nome || "").toString().trim().toLowerCase();
    return raStr === valor || nomeStr === valor;
  });

  const debug = document.getElementById('debug');

  if (!alunoAtual) {
    debug.innerText = "❌ Aluno não encontrado";
    ['ra','nome','nascimento','foto','sala','tutor','eletiva1','eletiva2'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('fotoAluno').style.display = 'none';
    document.getElementById('semFoto').style.display = 'none';
    alunoAtual = null;
    return;
  }

  // preencher campos
  document.getElementById('ra').value = alunoAtual.ra;
  document.getElementById('nome').value = alunoAtual.nome || "";
  document.getElementById('nascimento').value = alunoAtual.nascimento ? alunoAtual.nascimento.split('T')[0] : "";
  document.getElementById('foto').value = alunoAtual.foto || "";
  document.getElementById('sala').value = alunoAtual.sala || "";
  document.getElementById('tutor').value = alunoAtual.tutor || "";
  document.getElementById('eletiva1').value = alunoAtual.eletiva1 || "";
  document.getElementById('eletiva2').value = alunoAtual.eletiva2 || "";

  // 🔥 mostrar foto ou X
  const src = montarFoto(alunoAtual.foto);
  if (src) {
    document.getElementById('fotoAluno').src = src;
    document.getElementById('fotoAluno').style.display = 'block';
    document.getElementById('semFoto').style.display = 'none';
  } else {
    document.getElementById('fotoAluno').style.display = 'none';
    document.getElementById('semFoto').style.display = 'flex';
  }

  debug.innerText = "✅ Aluno carregado para edição:\n" + JSON.stringify(alunoAtual, null, 2);
}

// 🔥 salvar alterações
function salvar() {
  if (!alunoAtual) return;

  const postData = {
    ra: document.getElementById('ra').value,
    nome: document.getElementById('nome').value,
    nascimento: document.getElementById('nascimento').value,
    foto: document.getElementById('foto').value,
    sala: document.getElementById('sala').value,
    tutor: document.getElementById('tutor').value,
    eletiva1: document.getElementById('eletiva1').value,
    eletiva2: document.getElementById('eletiva2').value
  };

  fetch(url, {
    method: "POST",
    body: JSON.stringify(postData)
  })
  .then(res => res.text())
  .then(resp => {
    document.getElementById('debug').innerText = "✅ Alteração enviada com sucesso!\n\nPOST enviado:\n" + JSON.stringify(postData, null, 2) + "\n\nResposta do servidor:\n" + resp;
    buscar(); // recarrega o aluno atualizado
  })
  .catch(err => {
    document.getElementById('debug').innerText = "❌ Erro ao salvar:\n" + err;
  });
}

// 🔥 POPUP FOTO
function abrirPopupFoto() {
  const fotoId = document.getElementById('foto').value;
  const src = montarFoto(fotoId);
  if (!src) return;
  document.getElementById('imgPopup').src = src;
  document.getElementById('popup').style.display = 'flex';
}

function fecharPopup(e) {
  if (e.target.tagName === "IMG") return;
  document.getElementById('popup').style.display = 'none';
}
</script>

</body>
</html>
