<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Editar Alunos 38</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: linear-gradient(135deg, #eef2ff, #f8fafc);
  padding: 30px;
  color: #1f2937;
}

.container {
  max-width: 750px;
  margin: auto;
  background: #fff;
  padding: 25px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

.search-box {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

input {
  width: 100%;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid #e5e7eb;
}

button {
  padding: 10px 14px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-weight: 500;
}

.btn-primary {
  background: #6366f1;
  color: white;
}

.btn-success {
  background: #10b981;
  color: white;
}

.lista {
  max-height: 200px;
  overflow-y: auto;
  border: 1px solid #e5e7eb;
  border-radius: 10px;
  margin-bottom: 15px;
}

.item {
  padding: 10px;
  cursor: pointer;
  border-bottom: 1px solid #eee;
}

.item:hover {
  background: #eef2ff;
}

.item.active {
  background: #6366f1;
  color: white;
}

.mensagem {
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
  display: none;
  font-weight: 500;
}

.sucesso { background: #d1fae5; color: #065f46; }
.erro { background: #fee2e2; color: #991b1b; }

.hidden { display: none; }
</style>
</head>

<body>

<div class="container">
  <h2>✏️ Editar Alunos</h2>

  <div class="search-box">
    <input type="text" id="busca" placeholder="Digite nome ou RA">
    <button class="btn-primary" onclick="buscar()">Buscar</button>
  </div>

  <div id="lista" class="lista"></div>

  <div id="mensagem" class="mensagem"></div>

  <div id="form" class="hidden">
    <input id="ra" placeholder="RA">
    <input id="nome" placeholder="Nome">
    <input id="nascimento" type="date">
    <input id="foto" placeholder="Foto">
    <input id="sala" placeholder="Sala">
    <input id="tutor" placeholder="Tutor">
    <input id="eletiva1" placeholder="Eletiva 1">
    <input id="eletiva2" placeholder="Eletiva 2">

    <button class="btn-success" onclick="salvar()">💾 Salvar</button>
  </div>
</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbyJ1UGhJNDRY3W6gnrwAOZXIQ-A34LGNIBXvYmt1UiktwyDhWGg4T_Sb3eIIYf3uOP2Vg/exec";

let alunoOriginal = null;

function buscar() {
  const valor = document.getElementById("busca").value.trim();

  const lista = document.getElementById("lista");
  lista.innerHTML = "🔄 Buscando...";

  fetch(url + "?busca=" + encodeURIComponent(valor))
  .then(r => r.json())
  .then(dados => {
    lista.innerHTML = "";

    if (!dados || dados.length === 0) {
      lista.innerHTML = "❌ Nenhum aluno encontrado";
      return;
    }

    dados.forEach(a => {
      const div = document.createElement("div");
      div.className = "item";
      div.innerText = a.nome + " (RA: " + a.ra + ")";

      div.onclick = () => selecionar(a, div);

      lista.appendChild(div);
    });
  })
  .catch(() => {
    lista.innerHTML = "❌ Erro ao buscar";
  });
}

function selecionar(a, elemento) {
  alunoOriginal = {...a};

  document.querySelectorAll(".item").forEach(i => i.classList.remove("active"));
  elemento.classList.add("active");

  document.getElementById("form").classList.remove("hidden");

  document.getElementById("ra").value = a.ra || "";
  document.getElementById("nome").value = a.nome || "";
  document.getElementById("nascimento").value = a.nascimento ? a.nascimento.split('T')[0] : "";
  document.getElementById("foto").value = a.foto || "";
  document.getElementById("sala").value = a.sala || "";
  document.getElementById("tutor").value = a.tutor || "";
  document.getElementById("eletiva1").value = a.eletiva1 || "";
  document.getElementById("eletiva2").value = a.eletiva2 || "";
}

function salvar() {
  if (!alunoOriginal) return;

  const novo = {
    ra: document.getElementById("ra").value,
    nome: document.getElementById("nome").value,
    nascimento: document.getElementById("nascimento").value,
    foto: document.getElementById("foto").value,
    sala: document.getElementById("sala").value,
    tutor: document.getElementById("tutor").value,
    eletiva1: document.getElementById("eletiva1").value,
    eletiva2: document.getElementById("eletiva2").value
  };

  let confirmacao = "Confirme alterações:\n\n";

  for (let k in novo) {
    if (novo[k] != alunoOriginal[k]) {
      confirmacao += k + ": " + alunoOriginal[k] + " → " + novo[k] + "\n";
    }
  }

  if (!confirm(confirmacao)) return;

  const msg = document.getElementById("mensagem");
  msg.style.display = "block";
  msg.className = "mensagem";
  msg.innerText = "⏳ Salvando...";

  fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      ...novo,
      raOriginal: alunoOriginal.ra
    })
  })
  .then(res => res.json())
  .then(resp => {
    console.log(resp);

    if (!resp || resp.status !== "ok") {
      throw new Error("Erro no servidor");
    }

    msg.className = "mensagem sucesso";
    msg.innerText = "✅ Salvo com sucesso!";

    buscar();
  })
  .catch(err => {
    console.error(err);

    msg.className = "mensagem erro";
    msg.innerText = "❌ Erro ao salvar!";
  });
}
</script>

</body>
</html>
