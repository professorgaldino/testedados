<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Editar Alunos 34</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }

body {
  background: linear-gradient(135deg,#eef2ff,#f8fafc);
  padding:30px;
}

.container {
  max-width:600px;
  margin:auto;
  background:#fff;
  padding:25px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h2 { text-align:center; margin-bottom:20px; }

.search-box { display:flex; gap:10px; margin-bottom:15px; }

input {
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

button {
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.btn-primary { background:#6366f1; color:#fff; }
.btn-success { background:#10b981; color:#fff; }

button:disabled { opacity:0.6; cursor:not-allowed; }

.msg { margin-bottom:10px; text-align:center; font-weight:500; }

.foto {
  width:80px;
  height:80px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:10px;
  display:none;
}
</style>
</head>

<body>

<div class="container">
  <h2>✏️ Editar Alunos</h2>

  <div class="search-box">
    <input type="text" id="busca" placeholder="Digite RA ou Nome">
    <button class="btn-primary" onclick="buscar()">Buscar</button>
  </div>

  <div id="msg" class="msg"></div>

  <img id="foto" class="foto">

  <input type="text" id="ra" disabled placeholder="RA">
  <input type="text" id="nome" placeholder="Nome">
  <input type="date" id="nascimento">
  <input type="text" id="fotoInput" placeholder="Link ou ID da foto">
  <input type="text" id="sala" placeholder="Sala">
  <input type="text" id="tutor" placeholder="Tutor">
  <input type="text" id="eletiva1" placeholder="Eletiva 1">
  <input type="text" id="eletiva2" placeholder="Eletiva 2">

  <button id="btnSalvar" class="btn-success" onclick="salvar()" disabled>Salvar</button>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbz5f3Y5PVN7fVtdOhBMcCsz5anSCLsJPm1rC-5LX1LLlH1rIxKgH96FkncUyzsLCVD0Mg/exec";

let alunoAtual = null;

const msg = document.getElementById("msg");
const btn = document.getElementById("btnSalvar");

function montarFoto(valor){
  if(!valor) return null;
  valor = valor.trim();

  if(valor.includes("http")) return valor;

  return "https://lh3.googleusercontent.com/d/" + valor;
}

async function buscar(){
  const valor = document.getElementById("busca").value.trim();
  if(!valor){
    msg.innerHTML = "⚠️ Digite algo para buscar";
    return;
  }

  msg.innerHTML = "⏳ Buscando...";
  btn.disabled = true;

  try{
    const res = await fetch(URL);
    const dados = await res.json();

    alunoAtual = dados.find(a =>
      (a.ra+"").includes(valor) ||
      (a.nome || "").toLowerCase().includes(valor.toLowerCase())
    );

    if(!alunoAtual){
      msg.innerHTML = "❌ Nenhum aluno encontrado";
      return;
    }

    msg.innerHTML = "✅ Aluno encontrado";

    ra.value = alunoAtual.ra;
    nome.value = alunoAtual.nome || "";
    nascimento.value = alunoAtual.nascimento ? alunoAtual.nascimento.split("T")[0] : "";
    fotoInput.value = alunoAtual.foto || "";
    sala.value = alunoAtual.sala || "";
    tutor.value = alunoAtual.tutor || "";
    eletiva1.value = alunoAtual.eletiva1 || "";
    eletiva2.value = alunoAtual.eletiva2 || "";

    const src = montarFoto(alunoAtual.foto);
    if(src){
      foto.src = src;
      foto.style.display = "block";
    } else {
      foto.style.display = "none";
    }

    btn.disabled = false;

  }catch(e){
    msg.innerHTML = "❌ Erro ao buscar";
  }
}

async function salvar(){
  if(!alunoAtual){
    msg.innerHTML = "❌ Busque um aluno primeiro";
    return;
  }

  msg.innerHTML = "⏳ Salvando...";
  btn.disabled = true;

  const data = {
    ra: ra.value,
    nome: nome.value,
    nascimento: nascimento.value,
    foto: fotoInput.value,
    sala: sala.value,
    tutor: tutor.value,
    eletiva1: eletiva1.value,
    eletiva2: eletiva2.value
  };

  try{
    const res = await fetch(URL,{
      method:"POST",
      body: JSON.stringify(data)
    });

    const json = await res.json();

    msg.innerHTML = json.acao === "atualizado"
      ? "✅ Alterações salvas!"
      : "⚠️ Registro criado";

  }catch(e){
    msg.innerHTML = "❌ Erro ao salvar";
  }

  btn.disabled = false;
}
</script>

</body>
</html>
