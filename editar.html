<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Editar Alunos</title>
<style>
body { font-family: Arial; background: #f4f4f4; padding: 20px; }
.container { max-width: 700px; margin: auto; background: #fff; padding: 20px; border-radius: 10px; }
input, button { width: 100%; padding: 10px; margin-bottom: 10px; }
button { background: #4CAF50; color: white; border: none; cursor: pointer; }
h2 { text-align: center; }
label { font-weight: bold; }
.debug { background: #eee; padding: 10px; margin-top: 10px; border-radius: 5px; font-family: monospace; white-space: pre-wrap; }
</style>
</head>
<body>

<div class="container">
  <h2>✏️ Editar Alunos 6</h2>

  <input type="text" id="busca" placeholder="Digite RA ou Nome">
  <button onclick="buscar()">Buscar</button>

  <div id="formulario" style="display:none;">
    <label>RA</label>
    <input type="text" id="ra" disabled>
    <label>Nome</label>
    <input type="text" id="nome">
    <label>Data de Nascimento</label>
    <input type="date" id="nascimento">
    <label>Foto (ID do Google Drive)</label>
    <input type="text" id="foto">
    <label>Sala</label>
    <input type="text" id="sala">
    <label>Tutor</label>
    <input type="text" id="tutor">
    <label>Eletiva 1° Semestre</label>
    <input type="text" id="eletiva1">
    <label>Eletiva 2° Semestre</label>
    <input type="text" id="eletiva2">
    <button onclick="salvar()">Salvar Alterações</button>
  </div>

  <div class="debug" id="debug"></div>
</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbyWTU6i6cZSJ77HEI9tOxlpbt_g0Abbi6yDoWPePv_cJ-uq2cPonCdDvffMj6IcnxtxQQ/exec";

let dados = [];
let alunoAtual = null;

// 🔥 carregar todos os dados
fetch(url)
  .then(res => res.json())
  .then(data => {
    dados = data;
    document.getElementById('debug').innerText = "Dados carregados: " + JSON.stringify(dados, null, 2);
  });

// 🔥 busca aluno pelo RA ou Nome
function buscar() {
  const valor = document.getElementById('busca').value.toLowerCase().trim();
  alunoAtual = dados.find(a => String(a.ra).toLowerCase() === valor || (a.nome || "").toLowerCase() === valor);

  const form = document.getElementById('formulario');
  const debug = document.getElementById('debug');

  if (!alunoAtual) {
    form.style.display = "none";
    debug.innerText = "❌ Aluno não encontrado";
    return;
  }

  form.style.display = "block";

  // preencher campos
  document.getElementById('ra').value = alunoAtual.ra;
  document.getElementById('nome').value = alunoAtual.nome || "";
  document.getElementById('nascimento').value = alunoAtual.nascimento ? alunoAtual.nascimento.split('T')[0] : "";
  document.getElementById('foto').value = alunoAtual.foto || "";
  document.getElementById('sala').value = alunoAtual.sala || "";
  document.getElementById('tutor').value = alunoAtual.tutor || "";
  document.getElementById('eletiva1').value = alunoAtual.eletiva1 || "";
  document.getElementById('eletiva2').value = alunoAtual.eletiva2 || "";

  debug.innerText = "✅ Aluno carregado para edição";
}

// 🔥 salvar alterações
function salvar() {
  if (!alunoAtual) return;

  const postData = {
    ra: document.getElementById('ra').value,
    nome: document.getElementById('nome').value,
    nascimento: document.getElementById('nascimento').value,
    foto: document.getElementById('foto').value,
    sala: document.getElementById('sala').value,
    tutor: document.getElementById('tutor').value,
    eletiva1: document.getElementById('eletiva1').value,
    eletiva2: document.getElementById('eletiva2').value
  };

  fetch(url, {
    method: "POST",
    body: JSON.stringify(postData)
  })
  .then(res => res.text())
  .then(resp => {
    document.getElementById('debug').innerText = "✅ Alteração enviada com sucesso!\n\n" +
      "POST enviado:\n" + JSON.stringify(postData, null, 2) +
      "\n\nResposta do servidor:\n" + resp;
  })
  .catch(err => {
    document.getElementById('debug').innerText = "❌ Erro ao salvar:\n" + err;
  });
}
</script>

</body>
</html>
