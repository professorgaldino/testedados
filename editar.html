<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Editar Alunos 36</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: linear-gradient(135deg, #eef2ff, #f8fafc);
  padding: 30px;
  color: #1f2937;
}

.container {
  max-width: 750px;
  margin: auto;
  background: #fff;
  padding: 25px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

.search-box {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

input {
  width: 100%;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid #e5e7eb;
}

button {
  padding: 10px 14px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-weight: 500;
}

.btn-primary {
  background: #6366f1;
  color: white;
}

.btn-success {
  background: #10b981;
  color: white;
}

.lista {
  max-height: 200px;
  overflow-y: auto;
  border: 1px solid #e5e7eb;
  border-radius: 10px;
  margin-bottom: 15px;
}

.item {
  padding: 10px;
  cursor: pointer;
  border-bottom: 1px solid #eee;
}

.item:hover {
  background: #eef2ff;
}

.item.active {
  background: #6366f1;
  color: white;
}

.mensagem {
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
  display: none;
  font-weight: 500;
}

.sucesso { background: #d1fae5; color: #065f46; }
.erro { background: #fee2e2; color: #991b1b; }

.hidden { display: none; }
</style>
</head>

<body>

<div class="container">
  <h2>✏️ Editar Alunos</h2>

  <div class="search-box">
    <input type="text" id="busca" placeholder="Digite nome ou RA">
    <button class="btn-primary" onclick="buscar()">Buscar</button>
  </div>

  <div id="lista" class="lista"></div>

  <div id="mensagem" class="mensagem"></div>

  <div id="form" class="hidden">
    <input id="ra" placeholder="RA">
    <input id="nome" placeholder="Nome">
    <input id="nascimento" type="date">
    <input id="foto" placeholder="Foto">
    <input id="sala" placeholder="Sala">
    <input id="tutor" placeholder="Tutor">
    <input id="eletiva1" placeholder="Eletiva 1">
    <input id="eletiva2" placeholder="Eletiva 2">

    <button class="btn-success" onclick="salvar()">💾 Salvar</button>
  </div>
</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbxMg4BYeW7hBpCdpmQleD3pllaVtAy64h6KAWHUJDC5ZVxAHrLkAE1CAjMQdJZS2Vwg8A/exec";

let alunoOriginal = null;

function buscar() {
  const valor = busca.value.trim();

  lista.innerHTML = "🔄 Buscando...";

  fetch(url + "?busca=" + encodeURIComponent(valor))
  .then(r => r.json())
  .then(dados => {
    lista.innerHTML = "";

    if (dados.length === 0) {
      lista.innerHTML = "❌ Nenhum aluno encontrado";
      return;
    }

    dados.forEach(a => {
      const div = document.createElement("div");
      div.className = "item";
      div.innerText = a.nome + " (RA: " + a.ra + ")";

      div.onclick = () => selecionar(a, div);

      lista.appendChild(div);
    });
  })
  .catch(() => {
    lista.innerHTML = "❌ Erro ao buscar";
  });
}

function selecionar(a, elemento) {
  alunoOriginal = {...a};

  document.querySelectorAll(".item").forEach(i => i.classList.remove("active"));
  elemento.classList.add("active");

  form.classList.remove("hidden");

  ra.value = a.ra;
  nome.value = a.nome;
  nascimento.value = a.nascimento?.split("T")[0] || "";
  foto.value = a.foto || "";
  sala.value = a.sala || "";
  tutor.value = a.tutor || "";
  eletiva1.value = a.eletiva1 || "";
  eletiva2.value = a.eletiva2 || "";
}

function salvar() {
  if (!alunoOriginal) return;

  const novo = {
    ra: ra.value,
    nome: nome.value,
    nascimento: nascimento.value,
    foto: foto.value,
    sala: sala.value,
    tutor: tutor.value,
    eletiva1: eletiva1.value,
    eletiva2: eletiva2.value
  };

  let confirmacao = "Confirme alterações:\n\n";

  for (let k in novo) {
    if (novo[k] != alunoOriginal[k]) {
      confirmacao += k + ": " + alunoOriginal[k] + " → " + novo[k] + "\n";
    }
  }

  if (!confirm(confirmacao)) return;

  mensagem.style.display = "block";
  mensagem.className = "mensagem";
  mensagem.innerText = "⏳ Salvando...";

  fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      ...novo,
      raOriginal: alunoOriginal.ra
    })
  })
  .then(() => {
    mensagem.className = "mensagem sucesso";
    mensagem.innerText = "✅ Salvo com sucesso!";
    buscar();
  })
  .catch(() => {
    mensagem.className = "mensagem erro";
    mensagem.innerText = "❌ Erro ao salvar!";
  });
}
</script>

</body>
</html>
