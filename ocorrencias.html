<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Registro de Ocorrências</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; background: #f4f4f4; }
  .container { max-width: 600px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; }
  h2 { text-align: center; }
  label { display: block; margin-top: 10px; }
  input, select, textarea { width: 100%; padding: 8px; margin-top: 4px; border-radius: 4px; border: 1px solid #ccc; }
  button { margin-top: 20px; padding: 10px 20px; background: #28a745; color: #fff; border: none; border-radius: 5px; cursor: pointer; }
  button:hover { background: #218838; }
</style>
</head>
<body>
<div class="container">
  <h2>Registro de Ocorrências</h2>
  
  <label>Selecione o Aluno:</label>
  <select id="alunoSelect">
    <option value="">Escolha um aluno</option>
  </select>
  
  <label>Tutor do Aluno:</label>
  <input type="text" id="tutor" readonly>
  
  <label>RA do Aluno:</label>
  <input type="text" id="ra" readonly>
  
  <label>Nome do Professor:</label>
  <input type="text" id="professor">
  
  <label>Descrição da Ocorrência:</label>
  <textarea id="descricao" rows="4"></textarea>
  
  <label>Ação Tomada:</label>
  <textarea id="acao" rows="2"></textarea>
  
  <button onclick="enviar()">Enviar Ocorrência</button>
</div>

<script>
  // URL do WebApp de ocorrências
  const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxgsks-F3_Jqp6TZmBBkiPMQrewUXmTa3fSe6OdAs-6Fntd3AnKGGbIAAWOqziVNwpX/exec";

  // Carregar alunos do outro WebApp (exemplo da URL que você me passou anteriormente)
  const ALUNOS_URL = "https://script.google.com/macros/s/AKfycbxxbE3LiV3p2hPIegaqyqadlOzUqCwWkJDRHbKhkcR7sTyWX6VqWZ-5m577AB1ictRYVg/exec";

  let alunosExternos = [];

  // Buscar alunos externos e popular dropdown
  fetch(ALUNOS_URL)
    .then(res => res.json())
    .then(data => {
      alunosExternos = data;
      const select = document.getElementById("alunoSelect");
      alunosExternos.forEach(aluno => {
        const opt = document.createElement("option");
        opt.value = aluno.ra;
        opt.textContent = aluno.nome + " (" + aluno.sala + ")";
        opt.setAttribute("data-tutor", aluno.tutor);
        opt.setAttribute("data-nome", aluno.nome);
        select.appendChild(opt);
      });
    })
    .catch(err => alert("Erro ao carregar alunos: " + err));

  // Atualizar tutor e RA ao selecionar aluno
  document.getElementById("alunoSelect").addEventListener("change", function(){
    const selected = this.options[this.selectedIndex];
    document.getElementById("tutor").value = selected.getAttribute("data-tutor") || "";
    document.getElementById("ra").value = selected.value || "";
  });

  // Enviar ocorrência
  function enviar() {
    const ra = document.getElementById("ra").value;
    const nome = document.getElementById("alunoSelect").selectedOptions[0].getAttribute("data-nome");
    const professor = document.getElementById("professor").value;
    const descricao = document.getElementById("descricao").value;
    const acao = document.getElementById("acao").value;

    if(!ra || !professor || !descricao) {
      alert("Preencha RA, Professor e Descrição obrigatoriamente!");
      return;
    }

    fetch(WEBAPP_URL, {
      method: "POST",
      body: JSON.stringify({ra, nome, professor, descricao, acao})
    })
    .then(res => res.json())
    .then(data => {
      // Abrir WhatsApp com mensagem pronta
      window.open(data.whatsapp, "_blank");
      alert("Ocorrência registrada com sucesso!");
      // Limpar campos do formulário
      document.getElementById("professor").value = "";
      document.getElementById("descricao").value = "";
      document.getElementById("acao").value = "";
      document.getElementById("alunoSelect").selectedIndex = 0;
      document.getElementById("tutor").value = "";
      document.getElementById("ra").value = "";
    })
    .catch(err => alert("Erro ao enviar ocorrência: " + err));
  }
</script>
</body>
</html>
