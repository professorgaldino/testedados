<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Registro de Ocorrências</title>

<style>
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(135deg, #eef2f7, #e4ebf5);
    margin: 0;
    padding: 20px;
  }

  .container {
    max-width: 520px;
    margin: auto;
    background: #ffffff;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
  }

  h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #333;
  }

  label {
    font-size: 14px;
    margin-top: 12px;
    display: block;
    color: #555;
  }

  input, select, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 6px;
    border: 1px solid #dcdcdc;
    font-size: 14px;
    transition: all 0.2s ease;
  }

  input:focus, select:focus, textarea:focus {
    border-color: #007bff;
    outline: none;
    box-shadow: 0 0 0 2px rgba(0,123,255,0.15);
  }

  textarea {
    resize: none;
  }

  button {
    width: 100%;
    margin-top: 20px;
    padding: 12px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  button:hover {
    background: #0056b3;
    transform: translateY(-1px);
  }

  button:active {
    transform: scale(0.98);
  }
</style>
</head>

<body>

<div class="container">
  <h2>Registro de Ocorrências</h2>
  
  <label>Selecione a Sala</label>
  <select id="salaSelect">
    <option value="">Escolha uma sala</option>
  </select>
  
  <label>Selecione o Aluno</label>
  <select id="alunoSelect">
    <option value="">Escolha um aluno</option>
  </select>
  
  <label>Tutor do Aluno</label>
  <input type="text" id="tutor" readonly>
  
  <label>RA do Aluno</label>
  <input type="text" id="ra" readonly>

  <label>Data do Fato</label>
  <input type="date" id="dataFato">

  <label>Hora do Fato</label>
  <input type="time" id="horaFato">

  <label>Nome do Professor</label>
  <input type="text" id="professor">
  
  <label>Descrição da Ocorrência</label>
  <textarea id="descricao" rows="4"></textarea>
  
  <label>Ação Tomada</label>
  <textarea id="acao" rows="2"></textarea>
  
  <button onclick="enviar()">Enviar Ocorrência</button>
</div>

<script>
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxNbK4Sbvfz-wWb-w_THQw-B9Kfd_m-Lo6T71rvNAcUyflZe4C-9BJjGt45LPkltGXN/exec";
const ALUNOS_URL = "https://script.google.com/macros/s/AKfycbxxbE3LiV3p2hPIegaqyqadlOzUqCwWkJDRHbKhkcR7sTyWX6VqWZ-5m577AB1ictRYVg/exec";

let alunosExternos = [];

const salaSelect = document.getElementById("salaSelect");
const alunoSelect = document.getElementById("alunoSelect");

// carregar alunos
fetch(ALUNOS_URL)
  .then(res => res.json())
  .then(data => {
    alunosExternos = data;

    const salas = [...new Set(alunosExternos.map(a => a.sala).filter(Boolean))].sort();

    salas.forEach(sala => {
      const opt = document.createElement("option");
      opt.value = sala;
      opt.textContent = sala;
      salaSelect.appendChild(opt);
    });
  });

// filtrar alunos
salaSelect.addEventListener("change", function(){
  const selectedSala = this.value;

  alunoSelect.innerHTML = '<option value="">Escolha um aluno</option>';

  alunosExternos
    .filter(a => a.sala === selectedSala)
    .forEach(aluno => {
      const opt = document.createElement("option");
      opt.value = aluno.ra;
      opt.textContent = aluno.nome;
      opt.dataset.tutor = aluno.tutor;
      opt.dataset.nome = aluno.nome;
      alunoSelect.appendChild(opt);
    });

  document.getElementById("tutor").value = "";
  document.getElementById("ra").value = "";
});

// preencher dados
alunoSelect.addEventListener("change", function(){
  const selected = this.options[this.selectedIndex];

  document.getElementById("tutor").value = selected.dataset.tutor || "";
  document.getElementById("ra").value = selected.value || "";
});

// enviar
function enviar() {
  const sala = salaSelect.value;
  const ra = document.getElementById("ra").value;
  const tutor = document.getElementById("tutor").value;
  const nome = alunoSelect.selectedOptions[0]?.dataset.nome;
  const professor = document.getElementById("professor").value;
  const descricao = document.getElementById("descricao").value;
  const acao = document.getElementById("acao").value;
  const dataFato = document.getElementById("dataFato").value;
  const horaFato = document.getElementById("horaFato").value;

  if(!sala || !ra || !professor || !descricao || !dataFato || !horaFato){
    alert("Preencha todos os campos obrigatórios!");
    return;
  }

  const [ano, mes, dia] = dataFato.split("-");
  const dataFormatada = `${dia}/${mes}/${ano}`;

  // 🔥 ENVIO SEM CORS (FUNCIONA NO GITHUB)
  const formData = new URLSearchParams({
    sala,
    ra,
    nome,
    tutor,
    professor,
    descricao,
    acao,
    dataFato: dataFormatada,
    horaFato
  });

  fetch(WEBAPP_URL, {
    method: "POST",
    body: formData
  })
  .then(res => res.json())
  .then(data => {

    if(data.status !== "ok"){
      throw new Error(data.mensagem || "Erro no servidor");
    }

    window.open(data.whatsapp, "_blank");
    alert("Ocorrência registrada com sucesso!");

    location.reload();
  })
  .catch(err => {
    alert("Erro ao enviar: " + err.message);
    console.error(err);
  });
}
</script>

</body>
</html>
