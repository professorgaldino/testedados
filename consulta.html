<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Consulta de Alunos</title>

<style>
body { font-family: Arial; background: #f4f4f4; padding: 20px; }
.container { max-width: 1000px; margin: auto; }
input { width: 80%; padding: 10px; margin-bottom: 10px; }
button { padding: 10px 15px; margin-left: 5px; cursor: pointer; }
.aluno { background: white; padding: 10px; margin-bottom: 10px; border-radius: 8px; display: flex; gap: 10px; align-items: center; }
.foto { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; cursor: pointer; }
.sem-foto { width: 60px; height: 60px; border-radius: 50%; background: #eee; display: flex; align-items: center; justify-content: center; font-size: 24px; color: red; font-weight: bold; }
.paginacao { text-align: center; margin-top: 15px; }
/* POPUP */
.popup { display: none; position: fixed; z-index: 999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; }
.popup img { max-width: 95vw; max-height: 95vh; object-fit: contain; border-radius: 8px; }
.fechar { position: absolute; top: 15px; right: 25px; color: white; font-size: 28px; font-weight: bold; cursor: pointer; opacity: 0.7; }
.fechar:hover { opacity: 1; }
</style>
</head>

<body>
<div class="container">
  <h2>🔍 Consulta de Alunos 18</h2>
  <input type="text" id="busca" placeholder="Pesquisar qualquer campo">
  <button onclick="buscar()">Buscar</button>

  <div id="resultado"></div>

  <div class="paginacao">
    <button onclick="anterior()">⬅</button>
    <span id="pagina"></span>
    <button onclick="proximo()">➡</button>
  </div>
</div>

<!-- POPUP -->
<div id="popup" class="popup" onclick="fecharPopup(event)">
  <span class="fechar" onclick="fecharPopup(event)">×</span>
  <img id="imgPopup">
</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbxXnCBxqUpL-xQJTbXd5oVwPFBOGLBQ87-06FtWAh2MU-J3m3B9jrgJw_fd2DcTMkWHeQ/exec";

let dados = [];
let filtrados = [];
let paginaAtual = 1;
const porPagina = 5;

// montar foto usando lh3.googleusercontent.com
function montarFoto(id) {
  if (!id) return null;
  id = String(id).trim();
  if (id.length < 10) return null;
  return "https://lh3.googleusercontent.com/d/" + id;
}

// carregar dados
function carregar() {
  fetch(url)
    .then(r => r.json())
    .then(data => {
      dados = data;
      filtrados = data;
      renderizar();
    });
}

// função Buscar acionada pelo botão
function buscar() {
  const valor = document.getElementById("busca").value.toLowerCase().trim();
  if (!valor) {
    filtrados = dados;
  } else {
    filtrados = dados.filter(a => {
      // verificar todos os campos
      return Object.keys(a).some(k => {
        return String(a[k] || "").toLowerCase().includes(valor);
      });
    });
  }
  paginaAtual = 1;
  renderizar();
}

// render
function renderizar() {
  const inicio = (paginaAtual - 1) * porPagina;
  const paginaDados = filtrados.slice(inicio, inicio + porPagina);

  const div = document.getElementById("resultado");
  div.innerHTML = "";

  if (paginaDados.length === 0) {
    div.innerHTML = "❌ Nenhum resultado encontrado";
    return;
  }

  paginaDados.forEach(a => {
    const foto = montarFoto(a.foto);
    const fotoHTML = foto
      ? `<img class="foto" src="${foto}" onclick="abrirPopup('${foto}')">`
      : `<div class="sem-foto">❌</div>`;

    div.innerHTML += `
      <div class="aluno">
        ${fotoHTML}
        <div>
          <strong>${a.nome}</strong><br>
          RA: ${a.ra}<br>
          Data: ${a.data || '-'}<br>
          Nascimento: ${a.nascimento || '-'}<br>
          Sala: ${a.sala}<br>
          Tutor: ${a.tutor}<br>
          Eletiva1: ${a.eletiva1 || '-'}<br>
          Eletiva2: ${a.eletiva2 || '-'}
        </div>
      </div>
    `;
  });

  document.getElementById("pagina").innerText =
    "Página " + paginaAtual + " de " + Math.ceil(filtrados.length / porPagina);
}

// paginação
function proximo() {
  if (paginaAtual < Math.ceil(filtrados.length / porPagina)) {
    paginaAtual++;
    renderizar();
  }
}

function anterior() {
  if (paginaAtual > 1) {
    paginaAtual--;
    renderizar();
  }
}

// popup
function abrirPopup(src) {
  document.getElementById("popup").style.display = "flex";
  document.getElementById("imgPopup").src = src;
}

function fecharPopup(e) {
  if (e.target.tagName === "IMG") return;
  document.getElementById("popup").style.display = "none";
}

// iniciar
carregar();
</script>
</body>
</html>
