<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Consulta de Alunos</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: auto;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
    }

    button {
      background: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }

    .msg {
      text-align: center;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .aluno {
      background: white;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      object-fit: cover;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>🔍 Consulta de Alunos 4</h2>

  <input type="text" id="busca" placeholder="Digite nome ou RA">

  <button onclick="consultar()">Consultar</button>

  <div class="msg" id="msg"></div>
  <div id="resultado"></div>
</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbxXnCBxqUpL-xQJTbXd5oVwPFBOGLBQ87-06FtWAh2MU-J3m3B9jrgJw_fd2DcTMkWHeQ/exec";

function consultar() {
  const valor = document.getElementById("busca").value.toLowerCase();
  const resultado = document.getElementById("resultado");
  const msg = document.getElementById("msg");

  resultado.innerHTML = "";
  msg.innerHTML = "Carregando...";

  fetch(url)
    .then(res => res.json())
    .then(data => {

      const filtrados = data.filter(a =>
        a.nome.toLowerCase().includes(valor) ||
        a.ra.toString().includes(valor)
      );

      if (filtrados.length === 0) {
        msg.innerHTML = "❌ Nenhum aluno encontrado";
        return;
      }

      msg.innerHTML = "✅ Resultado encontrado";

      filtrados.forEach(a => {
        resultado.innerHTML += `
          <div class="aluno">
            <img src="${a.foto || 'https://via.placeholder.com/60'}">
            <div>
              <strong>${a.nome}</strong><br>
              RA: ${a.ra}<br>
              Sala: ${a.sala}
            </div>
          </div>
        `;
      });

    })
    .catch(err => {
      msg.innerHTML = "❌ Falha na consulta";
      console.error(err);
    });
}
</script>

</body>
</html>
