<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>DEBUG Alunos</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 20px;
    }

    .aluno {
      background: white;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
      border-left: 5px solid #4CAF50;
    }

    img {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      margin-bottom: 10px;
    }

    .debug {
      background: #eee;
      padding: 8px;
      font-size: 12px;
      margin-top: 5px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

<h2>🔍 DEBUG - Dados dos Alunos 10</h2>

<button onclick="carregar()">Carregar Dados</button>

<div id="resultado"></div>

<script>
const url = "https://script.google.com/macros/s/AKfycbxXnCBxqUpL-xQJTbXd5oVwPFBOGLBQ87-06FtWAh2MU-J3m3B9jrgJw_fd2DcTMkWHeQ/exec";

function montarFoto(id) {
  if (!id) return "https://via.placeholder.com/70";

  id = String(id).trim();

  return "https://drive.google.com/uc?export=view&id=" + id;
}

function carregar() {
  const div = document.getElementById("resultado");
  div.innerHTML = "Carregando...";

  fetch(url)
    .then(r => r.json())
    .then(data => {

      div.innerHTML = "";

      data.forEach((a, i) => {

        console.log("ALUNO:", a); // 🔥 console

        div.innerHTML += `
          <div class="aluno">

            <img src="${montarFoto(a.foto)}"
                 onerror="this.src='https://via.placeholder.com/70'">

            <strong>${a.nome}</strong><br>

            RA: ${a.ra}<br>
            Nascimento: ${a.nascimento}<br>
            Sala: ${a.sala}<br>
            Tutor: ${a.tutor}<br>
            Eletiva1: ${a.eletiva1}<br>
            Eletiva2: ${a.eletiva2}<br>

            <div class="debug">
FOTO (valor bruto): ${a.foto}
URL gerada: ${montarFoto(a.foto)}

OBJETO COMPLETO:
${JSON.stringify(a, null, 2)}
            </div>

          </div>
        `;
      });

    })
    .catch(err => {
      div.innerHTML = "Erro ao carregar";
      console.error(err);
    });
}
</script>

</body>
</html>
