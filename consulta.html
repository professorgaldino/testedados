<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Carômetro de Alunos</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      background: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }

    .msg {
      text-align: center;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .aluno {
      background: white;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      display: flex;
      gap: 15px;
      align-items: center;
    }

    img {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      object-fit: cover;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>📋 Carômetro de Alunos</h2>

  <button onclick="carregar()">Carregar Alunos</button>

  <div class="msg" id="msg"></div>
  <div id="resultado"></div>
</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbxXnCBxqUpL-xQJTbXd5oVwPFBOGLBQ87-06FtWAh2MU-J3m3B9jrgJw_fd2DcTMkWHeQ/exec";

// 🔥 Agora recebe apenas o ID
function montarFoto(id) {
  if (!id) return "https://via.placeholder.com/70";
  return "https://drive.google.com/uc?export=view&id=" + id;
}

function carregar() {
  const resultado = document.getElementById("resultado");
  const msg = document.getElementById("msg");

  resultado.innerHTML = "";
  msg.innerHTML = "Carregando dados...";

  fetch(url)
    .then(res => {
      if (!res.ok) throw new Error("Erro no servidor");
      return res.json();
    })
    .then(data => {

      if (!Array.isArray(data)) throw new Error("Resposta inválida");

      if (data.length === 0) {
        msg.innerHTML = "❌ Nenhum aluno encontrado";
        return;
      }

      msg.innerHTML = "✅ Dados carregados";

      data.forEach(a => {
        resultado.innerHTML += `
          <div class="aluno">
            <img src="${montarFoto(a.foto)}">
            <div>
              <strong>${a.nome}</strong><br>
              RA: ${a.ra}<br>
              Sala: ${a.sala}<br>
              Tutor: ${a.tutor}<br>
              Eletivas: ${a.eletiva1} / ${a.eletiva2}
            </div>
          </div>
        `;
      });

    })
    .catch(err => {
      msg.innerHTML = "❌ Falha ao carregar dados";
      console.error(err);
    });
}
</script>

</body>
</html>
