<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Carômetro de Alunos</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      background: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }

    .msg {
      text-align: center;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .aluno {
      background: white;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      display: flex;
      gap: 15px;
      align-items: center;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }

    img {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      object-fit: cover;
    }

    .info {
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>📋 Lista de alunos 9</h2>

  <button onclick="carregar()">Carregar Alunos</button>

  <div class="msg" id="msg"></div>
  <div id="resultado"></div>
</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbxXnCBxqUpL-xQJTbXd5oVwPFBOGLBQ87-06FtWAh2MU-J3m3B9jrgJw_fd2DcTMkWHeQ/exec";

// 🔥 Função robusta para montar a foto
function montarFoto(id) {
  if (!id) return "https://via.placeholder.com/70";

  try {
    id = id.toString().trim(); // remove espaços

    // Debug
    console.log("ID recebido:", id);

    return "https://drive.google.com/uc?export=view&id=" + id;
  } catch (e) {
    return "https://via.placeholder.com/70";
  }
}

// 🔥 Formatar data
function formatarData(data) {
  if (!data) return "";
  const d = new Date(data);
  return d.toLocaleDateString("pt-BR");
}

function carregar() {
  const resultado = document.getElementById("resultado");
  const msg = document.getElementById("msg");

  resultado.innerHTML = "";
  msg.innerHTML = "Carregando dados...";

  fetch(url)
    .then(res => {
      if (!res.ok) throw new Error("Erro no servidor");
      return res.json();
    })
    .then(data => {

      if (!Array.isArray(data)) throw new Error("Resposta inválida");

      console.log("Dados recebidos:", data); // 🔍 debug geral

      if (data.length === 0) {
        msg.innerHTML = "❌ Nenhum aluno encontrado";
        return;
      }

      msg.innerHTML = "✅ Dados carregados";

      data.forEach(a => {
        resultado.innerHTML += `
          <div class="aluno">
            <img src="${montarFoto(a.foto)}" onerror="this.src='https://via.placeholder.com/70'">
            <div class="info">
              <strong>${a.nome}</strong><br>
              RA: ${a.ra}<br>
              Nascimento: ${formatarData(a.nascimento)}<br>
              Sala: ${a.sala}<br>
              Tutor: ${a.tutor}<br>
              Eletivas: ${a.eletiva1} / ${a.eletiva2}
            </div>
          </div>
        `;
      });

    })
    .catch(err => {
      msg.innerHTML = "❌ Falha ao carregar dados";
      console.error("Erro:", err);
    });
}
</script>

</body>
</html>
