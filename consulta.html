<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Consulta de Alunos</title>

<style>
  body {
    font-family: Arial;
    background: #f4f4f4;
    padding: 20px;
  }

  .container {
    max-width: 1000px;
    margin: auto;
  }

  input {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
  }

  .aluno {
    background: white;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 8px;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  img {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    object-fit: cover;
    cursor: pointer;
  }

  .paginacao {
    text-align: center;
    margin-top: 15px;
  }

  button {
    padding: 8px 12px;
    margin: 5px;
    cursor: pointer;
  }

  /* 🔥 POPUP */
  .popup {
    display: none;
    position: fixed;
    z-index: 999;
    padding-top: 60px;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.8);
  }

  .popup img {
    display: block;
    margin: auto;
    max-width: 80%;
    max-height: 80%;
    border-radius: 10px;
  }

  .fechar {
    position: absolute;
    top: 20px;
    right: 40px;
    color: white;
    font-size: 40px;
    cursor: pointer;
  }
</style>
</head>

<body>

<div class="container">

  <h2>🔍 Consulta de Alunos 13</h2>

  <input type="text" id="busca" placeholder="Pesquisar por RA, Nome ou Sala" onkeyup="filtrar()">

  <div id="resultado"></div>

  <div class="paginacao">
    <button onclick="anterior()">⬅ Anterior</button>
    <span id="pagina"></span>
    <button onclick="proximo()">Próximo ➡</button>
  </div>

</div>

<!-- 🔥 POPUP -->
<div id="popup" class="popup">
  <span class="fechar" onclick="fecharPopup()">×</span>
  <img id="imgPopup">
</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbxXnCBxqUpL-xQJTbXd5oVwPFBOGLBQ87-06FtWAh2MU-J3m3B9jrgJw_fd2DcTMkWHeQ/exec";

let dados = [];
let filtrados = [];
let paginaAtual = 1;
const porPagina = 5;

// 🔥 FOTO (Google Drive funcionando)
function montarFoto(id) {
  if (!id) return "https://via.placeholder.com/60";
  id = String(id).trim();
  return "https://lh3.googleusercontent.com/d/" + id;
}

// 🔥 CARREGAR
function carregar() {
  fetch(url)
    .then(r => r.json())
    .then(data => {
      dados = data;
      filtrados = data;
      renderizar();
    });
}

// 🔥 BUSCA CORRIGIDA
function filtrar() {
  const valor = document.getElementById("busca").value
    .toLowerCase()
    .trim();

  filtrados = dados.filter(a => {

    const ra = String(a.ra || "").toLowerCase().trim();
    const nome = (a.nome || "").toLowerCase().trim();
    const sala = (a.sala || "").toLowerCase().trim();

    return (
      ra.includes(valor) ||
      nome.includes(valor) ||
      sala.includes(valor)
    );
  });

  paginaAtual = 1;
  renderizar();
}

// 🔥 RENDER
function renderizar() {
  const inicio = (paginaAtual - 1) * porPagina;
  const fim = inicio + porPagina;

  const paginaDados = filtrados.slice(inicio, fim);

  const div = document.getElementById("resultado");
  div.innerHTML = "";

  if (paginaDados.length === 0) {
    div.innerHTML = "❌ Nenhum resultado encontrado";
    return;
  }

  paginaDados.forEach(a => {
    const foto = montarFoto(a.foto);

    div.innerHTML += `
      <div class="aluno">
        <img src="${foto}"
             onclick="abrirPopup('${foto}')"
             onerror="this.src='https://via.placeholder.com/60'">

        <div>
          <strong>${a.nome}</strong><br>
          RA: ${a.ra}<br>
          Sala: ${a.sala}<br>
          Tutor: ${a.tutor}
        </div>
      </div>
    `;
  });

  document.getElementById("pagina").innerText =
    "Página " + paginaAtual + " de " + Math.ceil(filtrados.length / porPagina);
}

// 🔥 PAGINAÇÃO
function proximo() {
  if (paginaAtual < Math.ceil(filtrados.length / porPagina)) {
    paginaAtual++;
    renderizar();
  }
}

function anterior() {
  if (paginaAtual > 1) {
    paginaAtual--;
    renderizar();
  }
}

// 🔥 POPUP
function abrirPopup(src) {
  document.getElementById("popup").style.display = "block";
  document.getElementById("imgPopup").src = src;
}

function fecharPopup() {
  document.getElementById("popup").style.display = "none";
}

// 🔥 INICIAR
carregar();
</script>

</body>
</html>
