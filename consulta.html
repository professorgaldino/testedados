<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Consulta de Alunos</title>

<style>
  body {
    font-family: Arial;
    background: #f4f4f4;
    padding: 20px;
  }

  .container {
    max-width: 1000px;
    margin: auto;
  }

  input {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
  }

  .aluno {
    background: white;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 8px;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  img {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    object-fit: cover;
  }

  .paginacao {
    text-align: center;
    margin-top: 15px;
  }

  button {
    padding: 8px 12px;
    margin: 5px;
    cursor: pointer;
  }
</style>
</head>

<body>

<div class="container">

  <h2>🔍 Consulta de Alunos 12</h2>

  <input type="text" id="busca" placeholder="Pesquisar por RA, Nome ou Sala" onkeyup="filtrar()">

  <div id="resultado"></div>

  <div class="paginacao">
    <button onclick="anterior()">⬅ Anterior</button>
    <span id="pagina"></span>
    <button onclick="proximo()">Próximo ➡</button>
  </div>

</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbxXnCBxqUpL-xQJTbXd5oVwPFBOGLBQ87-06FtWAh2MU-J3m3B9jrgJw_fd2DcTMkWHeQ/exec";

let dados = [];
let filtrados = [];
let paginaAtual = 1;
const porPagina = 5;

// 🔥 foto funcionando
function montarFoto(id) {
  if (!id) return "https://via.placeholder.com/60";
  id = String(id).trim();
  return "https://lh3.googleusercontent.com/d/" + id;
}

function carregar() {
  fetch(url)
    .then(r => r.json())
    .then(data => {
      dados = data;
      filtrados = data;
      renderizar();
    });
}

function filtrar() {
  const valor = document.getElementById("busca").value.toLowerCase();

  filtrados = dados.filter(a =>
    String(a.ra).includes(valor) ||
    a.nome.toLowerCase().includes(valor) ||
    a.sala.toLowerCase().includes(valor)
  );

  paginaAtual = 1;
  renderizar();
}

function renderizar() {
  const inicio = (paginaAtual - 1) * porPagina;
  const fim = inicio + porPagina;

  const paginaDados = filtrados.slice(inicio, fim);

  const div = document.getElementById("resultado");
  div.innerHTML = "";

  if (paginaDados.length === 0) {
    div.innerHTML = "❌ Nenhum resultado encontrado";
    return;
  }

  paginaDados.forEach(a => {
    div.innerHTML += `
      <div class="aluno">
        <img src="${montarFoto(a.foto)}" onerror="this.src='https://via.placeholder.com/60'">
        <div>
          <strong>${a.nome}</strong><br>
          RA: ${a.ra}<br>
          Sala: ${a.sala}<br>
          Tutor: ${a.tutor}
        </div>
      </div>
    `;
  });

  document.getElementById("pagina").innerText =
    "Página " + paginaAtual + " de " + Math.ceil(filtrados.length / porPagina);
}

function proximo() {
  if (paginaAtual < Math.ceil(filtrados.length / porPagina)) {
    paginaAtual++;
    renderizar();
  }
}

function anterior() {
  if (paginaAtual > 1) {
    paginaAtual--;
    renderizar();
  }
}

// 🔥 inicia
carregar();
</script>

</body>
</html>
