<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro de Alunos 34</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

body {
  background: linear-gradient(135deg, #eef2ff, #f8fafc);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  background: #fff;
  padding: 25px;
  border-radius: 16px;
  width: 100%;
  max-width: 380px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

h2 { text-align: center; margin-bottom: 20px; }

form { display: flex; flex-direction: column; gap: 10px; }

input {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

button {
  padding: 11px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

button[type="submit"] {
  background: #6366f1;
  color: white;
}

button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.msg {
  text-align: center;
  margin-top: 10px;
  font-weight: 500;
}
</style>
</head>

<body>

<div class="container">
  <h2>Cadastro de Alunos</h2>

  <form id="form">
    <input type="text" id="ra" placeholder="RA" required>
    <input type="text" id="nome" placeholder="Nome" required>
    <input type="date" id="nascimento" required>
    <input type="text" id="foto" placeholder="URL da foto">
    <input type="text" id="sala" placeholder="Sala">
    <input type="text" id="tutor" placeholder="Tutor">
    <input type="text" id="eletiva1" placeholder="Eletiva 1º semestre">
    <input type="text" id="eletiva2" placeholder="Eletiva 2º semestre">

    <button type="submit" id="btn">Cadastrar</button>
  </form>

  <div class="msg" id="msg"></div>
</div>

<script>
const form = document.getElementById("form");
const msg = document.getElementById("msg");
const btn = document.getElementById("btn");

const URL = "https://script.google.com/macros/s/AKfycbz-lEHgUGtIGgnRcKu4mJ_i0w1D2NTVgT1n_p_id3hRKe5GC3GH-9AltgZiRHPqF6y4cg/exec";

document.getElementById("ra").addEventListener("blur", async () => {
  const ra = document.getElementById("ra").value;
  if (!ra) return;

  msg.innerHTML = "🔍 Verificando RA...";

  try {
    const res = await fetch(URL + "?ra=" + ra);
    const data = await res.json();

    if (data.existe) {
      msg.innerHTML = "⚠️ RA já cadastrado. Será atualizado.";
    } else {
      msg.innerHTML = "✅ RA disponível";
    }
  } catch {
    msg.innerHTML = "";
  }
});

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  msg.innerHTML = "⏳ Salvando...";
  btn.disabled = true;
  btn.innerText = "Salvando...";

  const data = {
    ra: ra.value,
    nome: nome.value,
    nascimento: nascimento.value,
    foto: foto.value,
    sala: sala.value,
    tutor: tutor.value,
    eletiva1: eletiva1.value,
    eletiva2: eletiva2.value
  };

  try {
    const res = await fetch(URL, {
      method: "POST",
      body: JSON.stringify(data)
    });

    const json = await res.json();

    if (json.acao === "criado") {
      msg.innerHTML = "✅ Aluno cadastrado!";
    } else {
      msg.innerHTML = "⚠️ Aluno atualizado!";
    }

    form.reset();

  } catch (error) {
    console.error(error);
    msg.innerHTML = "❌ Erro ao salvar!";
  }

  btn.disabled = false;
  btn.innerText = "Cadastrar";
});
</script>

</body>
</html>
