<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro de Alunos 34</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

body {
  background: linear-gradient(135deg, #eef2ff, #f8fafc);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  background: #fff;
  padding: 25px;
  border-radius: 16px;
  width: 100%;
  max-width: 380px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

h2 { text-align: center; margin-bottom: 20px; }

form { display: flex; flex-direction: column; gap: 10px; }

input {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

button {
  padding: 11px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

button[type="submit"] {
  background: #6366f1;
  color: white;
}

button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.msg {
  text-align: center;
  margin-top: 10px;
  font-weight: 500;
  min-height: 20px;
}

.msg.success { color: #16a34a; }
.msg.error { color: #dc2626; }
.msg.warn { color: #d97706; }

.loader {
  border: 3px solid #eee;
  border-top: 3px solid #6366f1;
  border-radius: 50%;
  width: 18px;
  height: 18px;
  animation: spin 0.8s linear infinite;
  display: inline-block;
  margin-right: 6px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="container">
  <h2>Cadastro de Alunos</h2>

  <form id="form">
    <input type="text" id="ra" placeholder="RA" required>
    <input type="text" id="nome" placeholder="Nome" required>
    <input type="date" id="nascimento" required>
    <input type="text" id="foto" placeholder="URL da foto">
    <input type="text" id="sala" placeholder="Sala">
    <input type="text" id="tutor" placeholder="Tutor">
    <input type="text" id="eletiva1" placeholder="Eletiva 1º semestre">
    <input type="text" id="eletiva2" placeholder="Eletiva 2º semestre">

    <button type="submit" id="btn">Cadastrar</button>
  </form>

  <div class="msg" id="msg"></div>
</div>

<script>
const form = document.getElementById("form");
const msg = document.getElementById("msg");
const btn = document.getElementById("btn");

const raInput = document.getElementById("ra");
const nome = document.getElementById("nome");
const nascimento = document.getElementById("nascimento");
const foto = document.getElementById("foto");
const sala = document.getElementById("sala");
const tutor = document.getElementById("tutor");
const eletiva1 = document.getElementById("eletiva1");
const eletiva2 = document.getElementById("eletiva2");

const URL = "https://script.google.com/macros/s/AKfycbz-lEHgUGtIGgnRcKu4mJ_i0w1D2NTVgT1n_p_id3hRKe5GC3GH-9AltgZiRHPqF6y4cg/exec";

// ===========================
// FETCH COM TIMEOUT
// ===========================
function fetchComTimeout(url, options = {}, tempo = 10000) {
  const controller = new AbortController();
  const id = setTimeout(() => controller.abort(), tempo);

  return fetch(url, {
    ...options,
    signal: controller.signal
  }).finally(() => clearTimeout(id));
}

// ===========================
// MENSAGEM
// ===========================
function setMsg(texto, tipo = "") {
  msg.className = "msg " + tipo;
  msg.innerHTML = texto;
}

// ===========================
// DEBOUNCE RA
// ===========================
let debounce;
raInput.addEventListener("input", () => {
  clearTimeout(debounce);
  debounce = setTimeout(verificarRA, 600);
});

async function verificarRA() {
  const ra = raInput.value.trim();
  if (!ra) return;

  setMsg(`<span class="loader"></span>Verificando RA...`);

  try {
    const res = await fetchComTimeout(URL + "?ra=" + encodeURIComponent(ra), {}, 8000);
    const data = await res.json();

    if (data.existe) {
      setMsg("⚠️ RA já cadastrado. Será atualizado.", "warn");
    } else {
      setMsg("✅ RA disponível", "success");
    }
  } catch {
    setMsg("❌ Falha ao verificar RA", "error");
  }
}

// ===========================
// SUBMIT
// ===========================
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  btn.disabled = true;
  btn.innerHTML = `<span class="loader"></span>Salvando...`;
  setMsg("Enviando dados...");

  const data = {
    ra: raInput.value.trim(),
    nome: nome.value.trim(),
    nascimento: nascimento.value,
    foto: foto.value.trim(),
    sala: sala.value.trim(),
    tutor: tutor.value.trim(),
    eletiva1: eletiva1.value.trim(),
    eletiva2: eletiva2.value.trim()
  };

  try {
    const res = await fetchComTimeout(URL, {
      method: "POST",
      body: JSON.stringify(data)
    }, 15000);

    const json = await res.json();

    if (json.acao === "criado") {
      setMsg("✅ Aluno cadastrado com sucesso!", "success");
    } else {
      setMsg("⚠️ Aluno atualizado com sucesso!", "warn");
    }

    form.reset();

  } catch (error) {
    if (error.name === "AbortError") {
      setMsg("⏱️ Tempo de resposta excedido. Tente novamente.", "error");
    } else {
      setMsg("❌ Erro ao salvar dados!", "error");
    }
  }

  btn.disabled = false;
  btn.innerText = "Cadastrar";
});
</script>

</body>
</html>
