<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Alunos</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 350px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
    }

    button {
      background: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }

    h2 {
      text-align: center;
    }

    .msg {
      text-align: center;
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Cadastro de Alunos 4</h2>

  <form id="form">
    <input type="text" id="ra" placeholder="RA" required>
    <input type="text" id="nome" placeholder="Nome" required>
    <input type="date" id="nascimento" required>
    <input type="text" id="foto" placeholder="URL da foto">
    <input type="text" id="sala" placeholder="Sala">
    <input type="text" id="tutor" placeholder="Tutor">
    <input type="text" id="eletiva1" placeholder="Eletiva 1º semestre">
    <input type="text" id="eletiva2" placeholder="Eletiva 2º semestre">

    <button type="submit">Cadastrar</button>
    <button onclick="window.location.href='https://professorgaldino.github.io/testedados/consulta.html'">Ir para Consulta</button>
    <button onclick="window.location.href='https://professorgaldino.github.io/testedados/editar.html'">Editar aluno</button>
  </form>

  <div class="msg" id="msg"></div>
</div>

<script>
document.getElementById("form").addEventListener("submit", function(e) {
  e.preventDefault();

  const msg = document.getElementById("msg");

  const data = {
    ra: document.getElementById("ra").value,
    nome: document.getElementById("nome").value,
    nascimento: document.getElementById("nascimento").value,
    foto: document.getElementById("foto").value,
    sala: document.getElementById("sala").value,
    tutor: document.getElementById("tutor").value,
    eletiva1: document.getElementById("eletiva1").value,
    eletiva2: document.getElementById("eletiva2").value
  };

  fetch("https://script.google.com/macros/s/AKfycbzL7iq8uYey256rwtQIGCyACgqH69NP83kUWsOFxn8vZos9LWZtFY7CWCFAdHBzF_2y9w/exec", {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  })
  .then(() => {
    msg.innerHTML = "✅ Aluno cadastrado com sucesso!";
    document.getElementById("form").reset();
  })
  .catch(() => {
    msg.innerHTML = "❌ Erro ao enviar!";
  });
});
</script>

</body>
</html>
