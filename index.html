<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gestão de Alunos</title>
<style>
body { font-family: Arial; margin: 20px; }
input, button, select { margin: 5px 0; padding: 5px; }
.success { color: green; }
.error { color: red; }
table { border-collapse: collapse; width: 100%; margin-top: 10px; }
th, td { border: 1px solid #ccc; padding: 5px; text-align: left; }
</style>
</head>
<body>

<h1>Gestão de Alunos</h1>

<!-- Inserir / Atualizar -->
<h2>Adicionar / Atualizar Aluno</h2>
<div id="mensagem"></div>
<form id="formAluno">
  RA: <input type="text" name="RA" required><br>
  Nome Completo: <input type="text" name="Nome Completo"><br>
  Data Nascimento: <input type="date" name="Data Nascimento"><br>
  Tutor: <input type="text" name="Tutor"><br>
  Eletiva Semestre 1: <input type="text" name="Eletiva Semestre 1"><br>
  Eletiva Semestre 2: <input type="text" name="Eletiva Semestre 2"><br>
  Foto URL: <input type="text" name="Foto URL"><br>
  Sala: <input type="text" name="Sala"><br>
  <button type="submit">Enviar</button>
</form>

<hr>

<!-- Filtro por sala -->
<h2>Filtrar Alunos por Sala</h2>
Sala: <input type="text" id="filtroSala">
<button onclick="filtrarSala()">Filtrar</button>
<button onclick="carregarAlunos()">Mostrar Todos</button>

<hr>

<!-- Buscar aluno -->
<h2>Procurar Aluno para Edição</h2>
RA ou Nome: <input type="text" id="buscaAluno">
<button onclick="buscarAluno()">Buscar</button>

<hr>

<!-- Lista de alunos -->
<h2>Lista de Alunos</h2>
<table id="tabelaAlunos">
<thead>
<tr>
  <th>RA</th><th>Nome Completo</th><th>Data Nascimento</th><th>Tutor</th>
  <th>Eletiva 1</th><th>Eletiva 2</th><th>Foto</th><th>Sala</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
const sheetUrl = 'https://script.google.com/macros/s/AKfycbz1qliBroQMntMiPcnru5AgWPs3lYSr8geC0q8FctyIwiVeYnpE5Lt23Z9OjWKJrfT8Lg/exec';

const tabela = document.querySelector('#tabelaAlunos tbody');
const mensagem = document.getElementById('mensagem');

let alunosCache = []; // guarda todos os alunos carregados

// Carregar alunos
async function carregarAlunos(){
  try{
    const res = await fetch(sheetUrl);
    const data = await res.json();
    alunosCache = data;
    renderizarTabela(data);
  }catch(err){
    console.error(err);
    tabela.innerHTML = `<tr><td colspan="8">Erro ao carregar alunos</td></tr>`;
  }
}

// Renderiza a tabela
function renderizarTabela(alunos){
  tabela.innerHTML = '';
  alunos.forEach(a=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${a.RA}</td>
      <td>${a["Nome Completo"]}</td>
      <td>${a["Data Nascimento"]}</td>
      <td>${a.Tutor}</td>
      <td>${a["Eletiva Semestre 1"]}</td>
      <td>${a["Eletiva Semestre 2"]}</td>
      <td>${a["Foto URL"] ? `<img src="${a["Foto URL"]}" width="50">` : ''}</td>
      <td>${a.Sala}</td>
    `;
    tabela.appendChild(tr);
  });
}

// Inserir / Atualizar aluno
document.getElementById('formAluno').addEventListener('submit', async e=>{
  e.preventDefault();
  const form = e.target;
  const dados = {};
  Array.from(form.elements).forEach(el=>{
    if(el.name) dados[el.name] = el.value;
  });
  try{
    const res = await fetch(sheetUrl,{
      method:'POST',
      body: JSON.stringify(dados),
      headers:{'Content-Type':'application/json'}
    });
    const result = await res.json();
    if(result.status==="ok"){
      mensagem.innerHTML = `<div class="success">Aluno inserido/atualizado com sucesso!</div>`;
      form.reset();
      carregarAlunos();
    }else{
      mensagem.innerHTML = `<div class="error">Erro ao inserir/atualizar aluno</div>`;
    }
  }catch(err){
    console.error(err);
    mensagem.innerHTML = `<div class="error">Erro: ${err}</div>`;
  }
});

// Filtrar alunos por sala
function filtrarSala(){
  const sala = document.getElementById('filtroSala').value.trim();
  if(!sala) return renderizarTabela(alunosCache);
  const filtrados = alunosCache.filter(a=>a.Sala && a.Sala.toLowerCase() === sala.toLowerCase());
  renderizarTabela(filtrados);
}

// Buscar aluno por RA ou nome
function buscarAluno(){
  const termo = document.getElementById('buscaAluno').value.trim().toLowerCase();
  const encontrado = alunosCache.find(a=>
    (a.RA && a.RA.toLowerCase()===termo) ||
    (a["Nome Completo"] && a["Nome Completo"].toLowerCase().includes(termo))
  );
  if(encontrado){
    // Preencher o formulário para edição
    const form = document.getElementById('formAluno');
    Array.from(form.elements).forEach(el=>{
      if(el.name) el.value = encontrado[el.name] || '';
    });
    mensagem.innerHTML = `<div class="success">Aluno encontrado. Pode editar e enviar.</div>`;
  }else{
    mensagem.innerHTML = `<div class="error">Aluno não encontrado</div>`;
  }
}

// Inicializa a tabela
carregarAlunos();
</script>

</body>
</html>
