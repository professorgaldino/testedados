<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Alunos</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      background: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }

    .msg {
      margin-top: 10px;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Cadastro de Alunos 2</h2>

  <form id="form">
    <input type="text" id="nome" placeholder="Nome" required>
    <input type="number" id="idade" placeholder="Idade" required min="0">
    <button type="submit">Enviar</button>
  </form>

  <div class="msg" id="msg"></div>
</div>

<script>
document.getElementById("form").addEventListener("submit", function(e) {
  e.preventDefault();

  const msg = document.getElementById("msg");

  const nome = document.getElementById("nome").value;
  const idade = document.getElementById("idade").value;

  fetch("https://script.google.com/macros/s/AKfycbwhO6p9WurXqaJ7JyKd4sXbToIRDIGP-i9_n-dS7fEl2NFWydP9mSIUmKXoy_XibNx1Yw/exec", {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      nome: nome,
      idade: idade
    })
  })
  .then(() => {
    msg.innerHTML = "✅ Enviado com sucesso!";
    document.getElementById("form").reset();
  })
  .catch(() => {
    msg.innerHTML = "❌ Erro ao enviar!";
  });
});
</script>

</body>
</html>
