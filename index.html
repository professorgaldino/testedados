<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Alunos Escola - Supabase</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>
<style>
  body { font-family: Arial; margin: 20px; }
  input, button { margin: 5px 0; }
  .error { color: red; }
  .success { color: green; }
</style>
</head>
<body>

<h1>Alunos</h1>
<ul id="listaAlunos"></ul>

<h2>Adicionar Aluno</h2>
<div id="mensagem"></div>
<form id="formAluno">
  RA: <input type="text" name="ra" required><br>
  Nome: <input type="text" name="nome_completo"><br>
  Data Nascimento: <input type="date" name="data_nascimento"><br>
  Tutor: <input type="text" name="tutor"><br>
  Eletiva 1: <input type="text" name="eletiva_semestre_1"><br>
  Eletiva 2: <input type="text" name="eletiva_semestre_2"><br>
  Foto URL: <input type="text" name="foto_url"><br>
  Sala: <input type="text" name="sala"><br>
  <button type="submit">Adicionar</button>
</form>

<script>
const supabaseUrl = 'https://qxaqyyxslckjrpavydnx.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4YXF5eXhzbGNranJwYXZ5ZG54Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwODA3NzksImV4cCI6MjA5MDY1Njc3OX0.ZWquG71LA0uqz6NACy40dm6nylreS6kzPuAcxVGHxx0';
const supabase = supabaseJs.createClient(supabaseUrl, supabaseKey);

const listaAlunos = document.getElementById('listaAlunos');
const mensagem = document.getElementById('mensagem');

async function carregarAlunos(){
    const { data, error } = await supabase.from('alunos').select('*');
    if(error){
        console.error(error);
        mensagem.innerHTML = `<div class="error">Erro ao carregar alunos: ${error.message}</div>`;
        return;
    }
    listaAlunos.innerHTML = '';
    data.forEach(a => {
        const li = document.createElement('li');
        li.textContent = `${a.ra} - ${a.nome_completo} - ${a.sala}`;
        listaAlunos.appendChild(li);
    });
}

document.getElementById('formAluno').addEventListener('submit', async e => {
    e.preventDefault();
    const form = e.target;
    const dados = {
        ra: form.ra.value,
        nome_completo: form.nome_completo.value,
        data_nascimento: form.data_nascimento.value,
        tutor: form.tutor.value,
        eletiva_semestre_1: form.eletiva_semestre_1.value,
        eletiva_semestre_2: form.eletiva_semestre_2.value,
        foto_url: form.foto_url.value,
        sala: form.sala.value
    };

    const { data, error } = await supabase.from('alunos').insert([dados]);
    if(error){
        console.error(error);
        mensagem.innerHTML = `<div class="error">Erro ao inserir: ${error.message}</div>`;
    } else {
        mensagem.innerHTML = `<div class="success">Aluno inserido com sucesso!</div>`;
        form.reset();
        carregarAlunos();
    }
});

// Carregar alunos ao abrir
carregarAlunos();
</script>

</body>
</html>
