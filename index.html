<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Teste Completo Supabase</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

<h2>Cadastro Completo de Aluno</h2>

<input id="ra" placeholder="RA"><br>
<input id="nome" placeholder="Nome completo"><br>
<input id="data" type="date"><br>
<input id="tutor" placeholder="Tutor"><br>
<input id="eletiva1" placeholder="Eletiva 1º semestre"><br>
<input id="eletiva2" placeholder="Eletiva 2º semestre"><br>
<input id="sala" placeholder="Sala"><br>
<input id="foto" placeholder="Link da foto"><br><br>

<button onclick="inserir()">Inserir</button>
<button onclick="teste()">Teste automático</button>

<hr>

<h2>Status</h2>
<div id="status" style="padding:10px; border:1px solid #000;"></div>

<h2>Debug completo</h2>
<pre id="debug" style="background:#000;color:#0f0;padding:10px;"></pre>

<script>
const supabase = supabase.createClient(
  'https://qxaqyyxslckjrpavydnx.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4YXF5eXhzbGNranJwYXZ5ZG54Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwODA3NzksImV4cCI6MjA5MDY1Njc3OX0.ZWquG71LA0uqz6NACy40dm6nylreS6kzPuAcxVGHxx0'
);

// FUNÇÃO VISUAL
function mostrar(status, data, error) {
  document.getElementById('status').innerHTML =
    `<b>${status}</b><br><br>` +
    (error 
      ? `<span style="color:red">ERRO: ${error.message}</span>` 
      : `<span style="color:green">SUCESSO</span>`
    );

  document.getElementById('debug').textContent =
    "DATA:\n" + JSON.stringify(data, null, 2) +
    "\n\nERROR:\n" + JSON.stringify(error, null, 2);
}

// TESTE AUTOMÁTICO
async function teste() {
  const { data, error } = await supabase
    .from('alunos')
    .insert([{
      ra: "TESTE_FULL",
      nome_completo: "Aluno Teste Completo",
      data_nascimento: "2010-01-01",
      tutor: "Teste Tutor",
      eletiva_semestre_1: "Robótica",
      eletiva_semestre_2: "Artes",
      sala: "6A",
      foto_url: "https://via.placeholder.com/100"
    }])
    .select();

  mostrar("TESTE COMPLETO", data, error);
}

// INSERÇÃO REAL
async function inserir() {
  const ra = document.getElementById('ra').value.trim();
  const nome = document.getElementById('nome').value.trim();

  if (!ra || !nome) {
    alert("RA e Nome são obrigatórios");
    return;
  }

  const { data, error } = await supabase
    .from('alunos')
    .insert([{
      ra: ra,
      nome_completo: nome,
      data_nascimento: document.getElementById('data').value || null,
      tutor: document.getElementById('tutor').value || null,
      eletiva_semestre_1: document.getElementById('eletiva1').value || null,
      eletiva_semestre_2: document.getElementById('eletiva2').value || null,
      sala: document.getElementById('sala').value || null,
      foto_url: document.getElementById('foto').value || null
    }])
    .select();

  mostrar("INSERÇÃO COMPLETA", data, error);
}
</script>

</body>
</html>
