<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Consulta de Ocorrências com Filtro</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f4f4f4; }
    h1 { text-align: center; }
    .filtros { margin-bottom: 20px; text-align: center; }
    .filtros input, .filtros select { padding: 5px 10px; margin: 5px; font-size: 14px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; display: none; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; font-size: 14px; }
    th { background: #eee; }
    tr:nth-child(even) { background: #f9f9f9; }
    .error { color: red; text-align: center; margin-top: 20px; }
    .loading { text-align: center; font-weight: bold; }
    .total { margin-top: 10px; font-weight: bold; text-align: center; }
  </style>
</head>
<body>

<h1>Consulta de Ocorrências 18</h1>

<div class="filtros">
  <label>Sala: <input type="text" id="filtroSala" placeholder="Ex: 6A"></label>
  <label>Data Inicial: <input type="date" id="filtroDataInicial"></label>
  <label>Data Final: <input type="date" id="filtroDataFinal"></label>
  <button onclick="aplicarFiltro()">Filtrar</button>
</div>

<div class="loading" id="loading">Carregando ocorrências...</div>
<div class="error" id="error"></div>
<div class="total" id="totalOcorrencias"></div>

<table id="tabelaOcorrencias">
  <thead>
    <tr>
      <th>Data Registro</th>
      <th>Hora Registro</th>
      <th>RA</th>
      <th>Nome</th>
      <th>Sala</th>
      <th>Tutor</th>
      <th>Professor</th>
      <th>Descrição</th>
      <th>Ação Tomada</th>
      <th>Data do Fato</th>
      <th>Hora do Fato</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
  const urlWebApp = "https://script.google.com/macros/s/AKfycby8ee_iqmJuTW7oTYCbL064ITYLJ74h-U6F3gDkT28j9BKf6tq6sSmFsZ7d5vS4so4/exec";
  let todasOcorrencias = [];
  const tabela = document.getElementById("tabelaOcorrencias");
  const tbody = tabela.querySelector("tbody");
  const errorDiv = document.getElementById("error");
  const loadingDiv = document.getElementById("loading");
  const totalDiv = document.getElementById("totalOcorrencias");

  // Formata data ISO -> dd/mm/yyyy
  function formatarData(isoString) {
    if (!isoString) return "";
    const d = new Date(isoString);
    const dia = String(d.getDate()).padStart(2, "0");
    const mes = String(d.getMonth() + 1).padStart(2, "0");
    const ano = d.getFullYear();
    return `${dia}/${mes}/${ano}`;
  }

  // Formata hora ISO -> HH:mm
  function formatarHora(isoString) {
    if (!isoString) return "";
    const d = new Date(isoString);
    const horas = String(d.getHours()).padStart(2, "0");
    const minutos = String(d.getMinutes()).padStart(2, "0");
    return `${horas}:${minutos}`;
  }

  // Callback JSONP
  function mostrarOcorrencias(dados) {
    loadingDiv.style.display = "none";

    if (!Array.isArray(dados) || dados.length === 0) {
      errorDiv.textContent = "Nenhuma ocorrência encontrada.";
      return;
    }

    todasOcorrencias = dados;
    aplicarFiltro(); // mostra todos inicialmente
  }

  function aplicarFiltro() {
    const sala = document.getElementById("filtroSala").value.trim().toUpperCase();
    const dataInicio = document.getElementById("filtroDataInicial").value;
    const dataFim = document.getElementById("filtroDataFinal").value;

    tbody.innerHTML = "";
    errorDiv.textContent = "";

    const filtradas = todasOcorrencias.filter(o => {
      let ok = true;
      if (sala) ok = ok && o.Sala && o.Sala.toUpperCase() === sala;
      if (dataInicio) ok = ok && o["Data do Fato"] && new Date(o["Data do Fato"]) >= new Date(dataInicio);
      if (dataFim) ok = ok && o["Data do Fato"] && new Date(o["Data do Fato"]) <= new Date(dataFim);
      return ok;
    });

    if (filtradas.length === 0) {
      errorDiv.textContent = "Nenhuma ocorrência encontrada para os filtros.";
    }

    totalDiv.textContent = `Total de ocorrências: ${filtradas.length}`;

    filtradas.forEach(o => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${formatarData(o["Data Registro"])}</td>
        <td>${formatarHora(o["Hora Registro"])}</td>
        <td>${o.ra || ""}</td>
        <td>${o.nome || ""}</td>
        <td>${o.Sala || ""}</td>
        <td>${o.Tutor || ""}</td>
        <td>${o.Professor || ""}</td>
        <td>${o["Descrição"] || ""}</td>
        <td>${o["Ação Tomada"] || ""}</td>
        <td>${formatarData(o["Data do Fato"])}</td>
        <td>${formatarHora(o["Hora do Fato"])}</td>
      `;
      tbody.appendChild(tr);
    });

    tabela.style.display = filtradas.length ? "table" : "none";
  }

  function carregarOcorrencias() {
    const script = document.createElement("script");
    script.src = urlWebApp + "?action=consultar&callback=mostrarOcorrencias";
    script.onerror = () => {
      loadingDiv.style.display = "none";
      errorDiv.textContent = "Erro ao carregar ocorrências.";
    };
    document.body.appendChild(script);
  }

  carregarOcorrencias();
</script>

</body>
</html>
