<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Consulta de Ocorrências</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; background: #f4f4f4; }
  .container { max-width: 900px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; }
  h2 { text-align: center; }
  label { display: block; margin-top: 10px; }
  select, input { padding: 8px; margin-top: 4px; border-radius: 4px; border: 1px solid #ccc; }
  button { margin-top: 20px; padding: 10px 20px; background: #007bff; color: #fff; border: none; border-radius: 5px; cursor: pointer; }
  button:hover { background: #0056b3; }
  table { width: 100%; border-collapse: collapse; margin-top: 20px; }
  th, td { border: 1px solid #ccc; padding: 6px; text-align: left; }
  th { background-color: #f2f2f2; }
</style>
</head>
<body>
<div class="container">
  <h2>Consulta de Ocorrências</h2>

  <label>Selecione a Sala:</label>
  <select id="salaSelect">
    <option value="">Todas as salas</option>
  </select>

  <label>Data Inicial:</label>
  <input type="date" id="dataInicial">

  <label>Data Final:</label>
  <input type="date" id="dataFinal">

  <button onclick="consultar()">Consultar</button>

  <div id="resultado"></div>
</div>

<script>
  // Popula salas com os alunos do WebApp
  const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzZamudeCelxdZgnbrgeMnqKKzSLtlJ7cgKmHcIpUY1XFKLctspVasztfTBwkVuGwhG/exec";

  // Carrega salas via google.script.run
  google.script.run.withSuccessHandler(function(alunos) {
    const salasSet = new Set(alunos.map(a => a.sala).filter(Boolean));
    const salaSelect = document.getElementById("salaSelect");
    Array.from(salasSet).sort().forEach(sala => {
      const opt = document.createElement("option");
      opt.value = sala;
      opt.textContent = sala;
      salaSelect.appendChild(opt);
    });
  }).getAlunosExternos(); // chama função Apps Script para trazer alunos

  function consultar() {
    const sala = document.getElementById("salaSelect").value;
    const dataInicial = document.getElementById("dataInicial").value;
    const dataFinal = document.getElementById("dataFinal").value;

    google.script.run.withSuccessHandler(mostrarTabela)
                     .consultarOcorrencias(sala, dataInicial, dataFinal);
  }

  function mostrarTabela(ocorrencias) {
    if(!ocorrencias || ocorrencias.length === 0) {
      document.getElementById("resultado").innerHTML = "<p>Nenhuma ocorrência encontrada.</p>";
      return;
    }

    let html = "<table><tr><th>Data Registro</th><th>Hora Registro</th><th>RA</th><th>Nome</th><th>Sala</th><th>Tutor</th><th>Professor</th><th>Descrição</th><th>Ação</th><th>Data do Fato</th><th>Hora do Fato</th></tr>";
    ocorrencias.forEach(o => {
      html += `<tr>
        <td>${o.dataRegistro}</td>
        <td>${o.horaRegistro}</td>
        <td>${o.ra}</td>
        <td>${o.nome}</td>
        <td>${o.sala}</td>
        <td>${o.tutor}</td>
        <td>${o.professor}</td>
        <td>${o.descricao}</td>
        <td>${o.acao}</td>
        <td>${o.dataFato}</td>
        <td>${o.horaFato}</td>
      </tr>`;
    });
    html += "</table>";
    document.getElementById("resultado").innerHTML = html;
  }
</script>
</body>
</html>
