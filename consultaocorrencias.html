<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Consulta de Ocorrências</title>

  <!-- 🔥 ESSENCIAL PARA RESPONSIVO -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #f6f8fb;
      padding: 15px;
      color: #1f2937;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 20px;
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      margin-bottom: 15px;
    }

    /* 🔥 FILTROS RESPONSIVOS */
    .filtros {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
    }

    .filtros input {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    .filtros button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #6366f1;
      color: white;
      cursor: pointer;
      font-weight: 500;
    }

    /* 🔥 TABELA RESPONSIVA */
    .table-container {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      min-width: 800px;
    }

    th, td {
      padding: 8px;
      text-align: left;
    }

    th {
      background: #f1f5f9;
      font-size: 12px;
    }

    tr {
      border-bottom: 1px solid #eee;
    }

    tr:hover {
      background: #f9fafb;
    }

    .loading, .error, .total {
      text-align: center;
      margin-top: 10px;
    }

    .error {
      color: red;
    }

    /* 🔥 PAGINAÇÃO */
    .paginacao {
      text-align: center;
      margin-top: 10px;
    }

    .paginacao button {
      padding: 6px 10px;
      margin: 3px;
      border: none;
      border-radius: 6px;
      background: #e5e7eb;
      cursor: pointer;
    }

    /* 📱 MOBILE */
    @media (max-width: 600px) {
      h1 {
        font-size: 16px;
      }

      table {
        font-size: 11px;
      }

      th, td {
        padding: 6px;
      }
    }
  </style>
</head>
<body>

<div class="container">

  <h1>Consulta de Ocorrências 27</h1>

  <div class="card">
    <div class="filtros">
      <input type="text" id="filtroSala" placeholder="Sala (ex: 9A)">
      <input type="text" id="filtroNome" placeholder="Nome do aluno">
      <input type="date" id="filtroDataInicial">
      <input type="date" id="filtroDataFinal">
      <button onclick="aplicarFiltro()">Filtrar</button>
    </div>
  </div>

  <div class="card">
    <div class="loading" id="loading">Carregando...</div>
    <div class="error" id="error"></div>
    <div class="total" id="total"></div>

    <div class="table-container">
      <table id="tabela">
        <thead>
          <tr>
            <th>Data Registro</th>
            <th>Hora</th>
            <th>RA</th>
            <th>Nome</th>
            <th>Sala</th>
            <th>Professor</th>
            <th>Data do Fato</th> <!-- 🔥 NOVO -->
            <th>Descrição</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="paginacao">
      <button onclick="anterior()">⬅</button>
      <span id="paginaInfo"></span>
      <button onclick="proxima()">➡</button>
    </div>
  </div>

</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbyA6NElCuqhdH3yfiQExmxGbVO7gYbrFLMw8nv2itt6BcILN6Q7gONiuzhtzyR_Vz8w/exec?action=consultar";

let dados = [];
let filtrados = [];

let pagina = 1;
const porPagina = 20;

const tbody = document.querySelector("tbody");
const tabela = document.getElementById("tabela");

function parseData(d) {
  if (!d) return null;

  if (d.includes("/")) {
    const [dia, mes, ano] = d.split("/");
    return new Date(ano, mes - 1, dia);
  }

  return null;
}

function render() {
  tbody.innerHTML = "";

  const inicio = (pagina - 1) * porPagina;
  const paginaDados = filtrados.slice(inicio, inicio + porPagina);

  const frag = document.createDocumentFragment();

  paginaDados.forEach(o => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${o["Data Registro"] || ""}</td>
      <td>${o["Hora Registro"] || ""}</td>
      <td>${o.ra || ""}</td>
      <td>${o.nome || ""}</td>
      <td>${o.Sala || ""}</td>
      <td>${o.Professor || ""}</td>
      <td>${o["Data do Fato"] || ""}</td>
      <td>${o["Descrição"] || ""}</td>
    `;

    frag.appendChild(tr);
  });

  tbody.appendChild(frag);
  tabela.style.display = filtrados.length ? "table" : "none";

  document.getElementById("paginaInfo").textContent =
    `Página ${pagina} de ${Math.ceil(filtrados.length / porPagina)}`;
}

function aplicarFiltro() {
  const sala = document.getElementById("filtroSala").value.trim().toUpperCase();
  const nome = document.getElementById("filtroNome").value.toLowerCase();
  const dataI = document.getElementById("filtroDataInicial").value;
  const dataF = document.getElementById("filtroDataFinal").value;

  filtrados = dados.filter(o => {
    let ok = true;

    const dataFato = parseData(o["Data do Fato"]);

    if (sala) ok = ok && o.Sala && o.Sala.toUpperCase().includes(sala);
    if (nome) ok = ok && o.nome && o.nome.toLowerCase().includes(nome);

    if (dataI && dataFato) ok = ok && dataFato >= new Date(dataI);
    if (dataF && dataFato) ok = ok && dataFato <= new Date(dataF);

    return ok;
  });

  pagina = 1;
  document.getElementById("total").textContent = `Total: ${filtrados.length}`;
  render();
}

function anterior() {
  if (pagina > 1) {
    pagina--;
    render();
  }
}

function proxima() {
  if (pagina < Math.ceil(filtrados.length / porPagina)) {
    pagina++;
    render();
  }
}

async function carregar() {
  try {
    const res = await fetch(url);
    dados = await res.json();
    filtrados = dados;

    document.getElementById("loading").style.display = "none";
    aplicarFiltro();

  } catch (e) {
    document.getElementById("loading").style.display = "none";
    document.getElementById("error").textContent = "Erro ao carregar.";
  }
}

carregar();
</script>

</body>
</html>
