<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Consulta de Ocorrências</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f4f4f4; }
    h1 { text-align: center; }
    select, input { padding: 5px; margin: 5px; }
    button { padding: 5px 10px; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; background: #fff; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background: #eee; }
    a.whatsapp { color: green; text-decoration: none; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Consulta de Ocorrências 11</h1>

  <div>
    <label for="sala">Sala:</label>
    <select id="sala">
      <option value="">Todas</option>
    </select>

    <label for="dataInicio">Data Início:</label>
    <input type="date" id="dataInicio">

    <label for="dataFim">Data Fim:</label>
    <input type="date" id="dataFim">

    <button onclick="consultar()">Consultar</button>
  </div>

  <table id="tabelaResultados">
    <thead>
      <tr>
        <th>Data Fato</th>
        <th>Hora Fato</th>
        <th>RA</th>
        <th>Aluno</th>
        <th>Sala</th>
        <th>Tutor</th>
        <th>Professor</th>
        <th>Descrição</th>
        <th>Ação Tomada</th>
        <th>WhatsApp</th>
      </tr>
    </thead>
    <tbody>
    </tbody>
  </table>

  <script>
    const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbyRzOZeSZ0AHi_os7tuNlOEdI4FOVya-lakiMA_0G5bffe05B5OvCOw7ZZx0EPDPzKk/exec";

    // Carrega salas únicas ao abrir a página
    window.onload = async () => {
      try {
        const response = await fetch(WEBAPP_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ action: "salas" })
        });
        const salas = await response.json();
        const select = document.getElementById("sala");
        salas.forEach(s => {
          const option = document.createElement("option");
          option.value = s;
          option.textContent = s;
          select.appendChild(option);
        });
      } catch (err) {
        console.error("Erro ao carregar salas:", err);
      }
    };

    // Função de consulta
    async function consultar() {
      const sala = document.getElementById("sala").value;
      const dataInicio = document.getElementById("dataInicio").value;
      const dataFim = document.getElementById("dataFim").value;

      const tbody = document.querySelector("#tabelaResultados tbody");
      tbody.innerHTML = "<tr><td colspan='10'>Carregando...</td></tr>";

      try {
        const response = await fetch(WEBAPP_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ 
            action: "consultar",
            sala: sala,
            dataInicial: dataInicio,
            dataFinal: dataFim
          })
        });
        const dados = await response.json();

        if (dados.length === 0) {
          tbody.innerHTML = "<tr><td colspan='10'>Nenhuma ocorrência encontrada</td></tr>";
          return;
        }

        tbody.innerHTML = "";
        dados.forEach(o => {
          const tr = document.createElement("tr");
          // Monta link para WhatsApp
          const mensagem = `Ocorrência para ${o.nome} (${o.ra})\nData do Fato: ${o["Data do Fato"]}\nHora: ${o["Hora do Fato"]}\nProfessor: ${o.Professor}\nDescrição: ${o["Descrição"]}\nAção: ${o["Ação Tomada"]}`;
          const numero = o.Tutor === "Everton" ? "5519990020650" : "551996785799"; // ajustar conforme seu mapeamento
          const waLink = `https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`;

          tr.innerHTML = `
            <td>${o["Data do Fato"] || ""}</td>
            <td>${o["Hora do Fato"] || ""}</td>
            <td>${o.ra || ""}</td>
            <td>${o.nome || ""}</td>
            <td>${o.Sala || ""}</td>
            <td>${o.Tutor || ""}</td>
            <td>${o.Professor || ""}</td>
            <td>${o["Descrição"] || ""}</td>
            <td>${o["Ação Tomada"] || ""}</td>
            <td><a class="whatsapp" href="${waLink}" target="_blank">WhatsApp</a></td>
          `;
          tbody.appendChild(tr);
        });
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan='10'>Erro: ${err.message}</td></tr>`;
        console.error(err);
      }
    }
  </script>
</body>
</html>
