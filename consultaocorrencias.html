<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Consulta de Ocorrências</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f4f4f4; }
    h1 { text-align: center; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; display: none; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; font-size: 14px; }
    th { background: #eee; }
    tr:nth-child(even) { background: #f9f9f9; }
    .error { color: red; text-align: center; margin-top: 20px; }
    .loading { text-align: center; font-weight: bold; }
  </style>
</head>
<body>

<h1>Consulta de Ocorrências 15</h1>
<div class="loading">Carregando ocorrências...</div>
<div class="error" id="error"></div>

<table id="tabelaOcorrencias">
  <thead>
    <tr>
      <th>Data Registro</th>
      <th>Hora Registro</th>
      <th>RA</th>
      <th>Nome</th>
      <th>Sala</th>
      <th>Tutor</th>
      <th>Professor</th>
      <th>Descrição</th>
      <th>Ação Tomada</th>
      <th>Data do Fato</th>
      <th>Hora do Fato</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
  const urlWebApp = "https://script.google.com/macros/s/AKfycbxuLqZL8_w31EGMmGLx-ngQUVt3Om1NmMVCrst929PGi4wgCADTpbiuuHVRlET7iXDB/exec";
  const tabela = document.getElementById("tabelaOcorrencias");
  const tbody = tabela.querySelector("tbody");
  const errorDiv = document.getElementById("error");
  const loadingDiv = document.querySelector(".loading");

  async function carregarOcorrencias() {
    try {
      const response = await fetch(urlWebApp, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "consultar" })
      });

      if (!response.ok) throw new Error("Erro HTTP: " + response.status);

      const dados = await response.json();

      if (!Array.isArray(dados) || dados.length === 0) {
        errorDiv.textContent = "Nenhuma ocorrência encontrada.";
        loadingDiv.style.display = "none";
        return;
      }

      dados.forEach(o => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${o["Data Registro"] || ""}</td>
          <td>${o["Hora Registro"] || ""}</td>
          <td>${o.ra || ""}</td>
          <td>${o.nome || ""}</td>
          <td>${o.Sala || ""}</td>
          <td>${o.Tutor || ""}</td>
          <td>${o.Professor || ""}</td>
          <td>${o["Descrição"] || ""}</td>
          <td>${o["Ação Tomada"] || ""}</td>
          <td>${o["Data do Fato"] || ""}</td>
          <td>${o["Hora do Fato"] || ""}</td>
        `;
        tbody.appendChild(tr);
      });

      loadingDiv.style.display = "none";
      tabela.style.display = "table";

    } catch (err) {
      loadingDiv.style.display = "none";
      errorDiv.textContent = "Erro ao carregar ocorrências: " + err.message;
      console.error(err);
    }
  }

  // Executa ao carregar a página
  carregarOcorrencias();
</script>

</body>
</html>
