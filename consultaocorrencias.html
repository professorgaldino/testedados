<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Consulta de Ocorrências</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; }
    .container { max-width: 900px; margin: auto; background: #fff; padding: 20px; border-radius: 10px; }
    h1 { text-align: center; }
    label { display: block; margin-top: 15px; font-weight: bold; }
    select, input { width: 100%; padding: 8px; margin-top: 5px; }
    button { margin-top: 20px; padding: 10px 20px; font-size: 16px; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background: #eee; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Consulta de Ocorrências 4</h1>
    
    <label for="sala">Selecione a Sala:</label>
    <select id="sala">
      <option value="">Todas as salas</option>
    </select>

    <label for="dataInicial">Data Inicial:</label>
    <input type="date" id="dataInicial">

    <label for="dataFinal">Data Final:</label>
    <input type="date" id="dataFinal">

    <button onclick="consultar()">Consultar</button>

    <table id="tabelaResultados">
      <thead>
        <tr>
          <th>Data Registro</th>
          <th>Hora Registro</th>
          <th>RA</th>
          <th>Nome</th>
          <th>Sala</th>
          <th>Tutor</th>
          <th>Professor</th>
          <th>Descrição</th>
          <th>Ação</th>
          <th>Data do Fato</th>
          <th>Hora do Fato</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    const urlAppScript = "https://script.google.com/macros/s/AKfycbxw8nHg3ZQ8MzzphvR5cIdlB_1DQ6MVtRfnE3KZLSRvzwtJlsd18KapclXqaEdp7CKk/exec";

    // Buscar salas ao carregar a página
    window.onload = async () => {
      try {
        const res = await fetch(urlAppScript);
        const data = await res.text();
        const parser = new DOMParser();
        parser.parseFromString(data, "text/html"); // Apenas para inicializar
        // Supondo que as salas foram injetadas no Apps Script como var salas
        if (typeof salas !== "undefined") {
          const select = document.getElementById("sala");
          salas.forEach(s => {
            const option = document.createElement("option");
            option.value = s;
            option.textContent = s;
            select.appendChild(option);
          });
        }
      } catch (err) {
        console.error("Erro ao carregar salas:", err);
      }
    }

    async function consultar() {
      const sala = document.getElementById("sala").value;
      const dataInicial = document.getElementById("dataInicial").value;
      const dataFinal = document.getElementById("dataFinal").value;

      const payload = {
        action: "consultar",
        sala: sala,
        dataInicial: dataInicial,
        dataFinal: dataFinal
      };

      try {
        const res = await fetch(urlAppScript, {
          method: "POST",
          body: JSON.stringify(payload)
        });
        const resultado = await res.json();
        const tbody = document.querySelector("#tabelaResultados tbody");
        tbody.innerHTML = "";

        if (resultado.length === 0) {
          tbody.innerHTML = "<tr><td colspan='11'>Nenhuma ocorrência encontrada.</td></tr>";
          return;
        }

        resultado.forEach(o => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${o["Data Registro"]}</td>
            <td>${o["Hora Registro"]}</td>
            <td>${o.ra}</td>
            <td>${o.nome}</td>
            <td>${o.Sala}</td>
            <td>${o.Tutor}</td>
            <td>${o.Professor}</td>
            <td>${o.Descrição}</td>
            <td>${o["Ação Tomada"]}</td>
            <td>${o["Data do Fato"]}</td>
            <td>${o["Hora do Fato"]}</td>
          `;
          tbody.appendChild(tr);
        });
      } catch (err) {
        console.error("Erro ao consultar ocorrências:", err);
      }
    }
  </script>
</body>
</html>
