<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Consulta de Ocorrências</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background: #f6f8fb; padding: 30px; color: #1f2937; }
    h1 { text-align: center; margin-bottom: 30px; }

    .container { max-width: 1200px; margin: auto; }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      margin-bottom: 20px;
    }

    .filtros {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .filtros input {
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: #6366f1;
      color: white;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      display: none;
      font-size: 13px;
    }

    th, td { padding: 10px; }
    th { background: #f1f5f9; }
    tr { border-bottom: 1px solid #eee; }

    .loading, .error, .total {
      text-align: center;
      margin-top: 10px;
    }

    .paginacao {
      text-align: center;
      margin-top: 15px;
    }

    .paginacao button {
      margin: 5px;
      background: #e5e7eb;
      color: #111;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Consulta de Ocorrências 🚀</h1>

  <div class="card">
    <div class="filtros">
      <input type="text" id="filtroSala" placeholder="Sala (ex: 9A)">
      <input type="text" id="filtroNome" placeholder="Nome do aluno">
      <input type="date" id="filtroDataInicial">
      <input type="date" id="filtroDataFinal">
      <button onclick="aplicarFiltro()">Filtrar</button>
    </div>
  </div>

  <div class="card">
    <div class="loading" id="loading">Carregando...</div>
    <div class="error" id="error"></div>
    <div class="total" id="total"></div>

    <table id="tabela">
      <thead>
        <tr>
          <th>Data</th>
          <th>Hora</th>
          <th>RA</th>
          <th>Nome</th>
          <th>Sala</th>
          <th>Tutor</th>
          <th>Professor</th>
          <th>Descrição</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <div class="paginacao">
      <button onclick="anterior()">⬅</button>
      <span id="paginaInfo"></span>
      <button onclick="proxima()">➡</button>
    </div>
  </div>
</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbyA6NElCuqhdH3yfiQExmxGbVO7gYbrFLMw8nv2itt6BcILN6Q7gONiuzhtzyR_Vz8w/exec?action=consultar";

let dados = [];
let filtrados = [];

let pagina = 1;
const porPagina = 30;

const tbody = document.querySelector("tbody");
const tabela = document.getElementById("tabela");

function parseData(d) {
  if (!d) return null;

  if (typeof d === "string" && d.includes("T")) {
    return new Date(d);
  }

  if (typeof d === "string" && d.includes("/")) {
    const [dia, mes, ano] = d.split("/");
    return new Date(ano, mes - 1, dia);
  }

  return null;
}

function render() {
  tbody.innerHTML = "";

  const inicio = (pagina - 1) * porPagina;
  const paginaDados = filtrados.slice(inicio, inicio + porPagina);

  const frag = document.createDocumentFragment();

  paginaDados.forEach(o => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${o["Data Registro"] || ""}</td>
      <td>${o["Hora Registro"] || ""}</td>
      <td>${o.ra || ""}</td>
      <td>${o.nome || ""}</td>
      <td>${o.Sala || ""}</td>
      <td>${o.Tutor || ""}</td>
      <td>${o.Professor || ""}</td>
      <td>${o["Descrição"] || ""}</td>
    `;

    frag.appendChild(tr);
  });

  tbody.appendChild(frag);
  tabela.style.display = filtrados.length ? "table" : "none";

  document.getElementById("paginaInfo").textContent =
    `Página ${pagina} de ${Math.ceil(filtrados.length / porPagina)}`;
}

function aplicarFiltro() {
  const sala = document.getElementById("filtroSala").value.trim().toUpperCase();
  const nome = document.getElementById("filtroNome").value.toLowerCase();
  const dataI = document.getElementById("filtroDataInicial").value;
  const dataF = document.getElementById("filtroDataFinal").value;

  filtrados = dados.filter(o => {
    let ok = true;

    const dataFato = parseData(o["Data do Fato"]);

    if (sala) ok = ok && o.Sala && o.Sala.trim().toUpperCase().includes(sala);
    if (nome) ok = ok && o.nome && o.nome.toLowerCase().includes(nome);

    if (dataI && dataFato) ok = ok && dataFato >= new Date(dataI);
    if (dataF && dataFato) ok = ok && dataFato <= new Date(dataF);

    return ok;
  });

  pagina = 1;
  document.getElementById("total").textContent = `Total: ${filtrados.length}`;
  render();
}

function anterior() {
  if (pagina > 1) {
    pagina--;
    render();
  }
}

function proxima() {
  if (pagina < Math.ceil(filtrados.length / porPagina)) {
    pagina++;
    render();
  }
}

async function carregar() {
  try {
    const res = await fetch(url);
    dados = await res.json();
    filtrados = dados;

    document.getElementById("loading").style.display = "none";
    aplicarFiltro();

  } catch (e) {
    document.getElementById("loading").style.display = "none";
    document.getElementById("error").textContent = "Erro ao carregar.";
  }
}

carregar();
</script>

</body>
</html>
