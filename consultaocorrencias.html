<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Consulta de Ocorrências</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #f6f8fb;
      padding: 30px;
      color: #1f2937;
    }

    h1 {
      text-align: center;
      font-weight: 600;
      margin-bottom: 30px;
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      margin-bottom: 20px;
    }

    .filtros {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      align-items: center;
    }

    .filtros label {
      font-size: 14px;
      display: flex;
      flex-direction: column;
    }

    .filtros input {
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
      margin-top: 4px;
      transition: 0.2s;
    }

    .filtros input:focus {
      border-color: #6366f1;
      outline: none;
    }

    button {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: #6366f1;
      color: white;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 18px;
    }

    button:hover {
      background: #4f46e5;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      display: none;
      font-size: 13px;
    }

    th, td {
      padding: 10px;
      text-align: left;
    }

    th {
      background: #f1f5f9;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    tr {
      border-bottom: 1px solid #eee;
    }

    tr:hover {
      background: #f9fafb;
    }

    .loading, .error, .total {
      text-align: center;
      margin-top: 10px;
    }

    .loading {
      font-weight: 500;
      color: #6b7280;
    }

    .error {
      color: #ef4444;
    }

    .total {
      font-weight: 600;
      color: #111827;
    }

    @media (max-width: 768px) {
      .filtros {
        flex-direction: column;
        align-items: stretch;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Consulta de Ocorrências 22</h1>

  <div class="card">
    <div class="filtros">
      <label>Sala
        <input type="text" id="filtroSala" placeholder="Ex: 6A">
      </label>

      <label>Data Inicial
        <input type="date" id="filtroDataInicial">
      </label>

      <label>Data Final
        <input type="date" id="filtroDataFinal">
      </label>

      <button onclick="aplicarFiltro()">Filtrar</button>
    </div>
  </div>

  <div class="card">
    <div class="loading" id="loading">Carregando ocorrências...</div>
    <div class="error" id="error"></div>
    <div class="total" id="totalOcorrencias"></div>

    <table id="tabelaOcorrencias">
      <thead>
        <tr>
          <th>Data Registro</th>
          <th>Hora Registro</th>
          <th>RA</th>
          <th>Nome</th>
          <th>Sala</th>
          <th>Tutor</th>
          <th>Professor</th>
          <th>Descrição</th>
          <th>Ação Tomada</th>
          <th>Data do Fato</th>
          <th>Hora do Fato</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
  const urlWebApp = "https://script.google.com/macros/s/AKfycbx7qTP4vZCFmRfoqw0es7TGEt411HLAAxRmV_GDxKcUP9iOJ0ua5Xd8A39lJkHd0dZ7/exec";
  let todasOcorrencias = [];
  const tabela = document.getElementById("tabelaOcorrencias");
  const tbody = tabela.querySelector("tbody");
  const errorDiv = document.getElementById("error");
  const loadingDiv = document.getElementById("loading");
  const totalDiv = document.getElementById("totalOcorrencias");

  function formatarData(isoString) {
    if (!isoString) return "";
    const d = new Date(isoString);
    const dia = String(d.getDate()).padStart(2, "0");
    const mes = String(d.getMonth() + 1).padStart(2, "0");
    const ano = d.getFullYear();
    return `${dia}/${mes}/${ano}`;
  }

  function formatarHora(isoString) {
    if (!isoString) return "";
    const d = new Date(isoString);
    const horas = String(d.getHours()).padStart(2, "0");
    const minutos = String(d.getMinutes()).padStart(2, "0");
    return `${horas}:${minutos}`;
  }

  function mostrarOcorrencias(dados) {
    loadingDiv.style.display = "none";

    if (!Array.isArray(dados) || dados.length === 0) {
      errorDiv.textContent = "Nenhuma ocorrência encontrada.";
      return;
    }

    todasOcorrencias = dados;
    aplicarFiltro();
  }

  function aplicarFiltro() {
    const sala = document.getElementById("filtroSala").value.trim().toUpperCase();
    const dataInicio = document.getElementById("filtroDataInicial").value;
    const dataFim = document.getElementById("filtroDataFinal").value;

    tbody.innerHTML = "";
    errorDiv.textContent = "";

    const filtradas = todasOcorrencias.filter(o => {
      let ok = true;
      if (sala) ok = ok && o.Sala && o.Sala.toUpperCase() === sala;
      if (dataInicio) ok = ok && o["Data do Fato"] && new Date(o["Data do Fato"]) >= new Date(dataInicio);
      if (dataFim) ok = ok && o["Data do Fato"] && new Date(o["Data do Fato"]) <= new Date(dataFim);
      return ok;
    });

    if (filtradas.length === 0) {
      errorDiv.textContent = "Nenhuma ocorrência encontrada para os filtros.";
    }

    totalDiv.textContent = `Total de ocorrências: ${filtradas.length}`;

    filtradas.forEach(o => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${formatarData(o["Data Registro"])}</td>
        <td>${formatarHora(o["Hora Registro"])}</td>
        <td>${o.ra || ""}</td>
        <td>${o.nome || ""}</td>
        <td>${o.Sala || ""}</td>
        <td>${o.Tutor || ""}</td>
        <td>${o.Professor || ""}</td>
        <td>${o["Descrição"] || ""}</td>
        <td>${o["Ação Tomada"] || ""}</td>
        <td>${formatarData(o["Data do Fato"])}</td>
        <td>${formatarHora(o["Hora do Fato"])}</td>
      `;
      tbody.appendChild(tr);
    });

    tabela.style.display = filtradas.length ? "table" : "none";
  }

  function carregarOcorrencias() {
    const script = document.createElement("script");
    script.src = urlWebApp + "?action=consultar&callback=mostrarOcorrencias";
    script.onerror = () => {
      loadingDiv.style.display = "none";
      errorDiv.textContent = "Erro ao carregar ocorrências.";
    };
    document.body.appendChild(script);
  }

  carregarOcorrencias();
</script>

</body>
</html>
