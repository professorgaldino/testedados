<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Consulta de Ocorrências</title>
<style>
body { font-family: Arial; padding: 20px; background: #f4f4f4; }
.container { max-width: 900px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; }
label { display: block; margin-top: 10px; }
input, select, button { padding: 8px; margin-top: 4px; border-radius: 4px; border: 1px solid #ccc; }
button { background: #28a745; color: #fff; border: none; cursor: pointer; }
button:hover { background: #218838; }
table { width: 100%; border-collapse: collapse; margin-top: 20px; }
th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
th { background: #f0f0f0; }
</style>
</head>
<body>
<div class="container">
  <h2>Consulta de Ocorrências 3</h2>

  <label>Sala</label>
  <select id="salaSelect">
    <option value="">Todas</option>
  </select>

  <label>Data Inicial</label>
  <input type="date" id="dataInicial">

  <label>Data Final</label>
  <input type="date" id="dataFinal">

  <button onclick="consultar()">Consultar</button>

  <table id="tabelaOcorrencias">
    <thead>
      <tr>
        <th>Data do Fato</th>
        <th>Hora do Fato</th>
        <th>RA</th>
        <th>Aluno</th>
        <th>Sala</th>
        <th>Tutor</th>
        <th>Professor</th>
        <th>Descrição</th>
        <th>Ação Tomada</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
async function carregarSalas() {
  // Buscar alunos para preencher salas
  const urlAlunos = "https://script.google.com/macros/s/AKfycbxxbE3LiV3p2hPIegaqyqadlOzUqWZ-5m577AB1ictRYVg/exec";
  const resp = await fetch(urlAlunos);
  const alunos = await resp.json();

  const salasSet = new Set(alunos.map(a => a.sala).filter(Boolean));
  const salaSelect = document.getElementById("salaSelect");

  Array.from(salasSet).sort().forEach(sala => {
    const opt = document.createElement("option");
    opt.value = sala;
    opt.textContent = sala;
    salaSelect.appendChild(opt);
  });
}

// Função para consultar ocorrências
async function consultar() {
  const sala = document.getElementById("salaSelect").value;
  const dataInicial = document.getElementById("dataInicial").value;
  const dataFinal = document.getElementById("dataFinal").value;

  const urlOcorrencias = "https://script.google.com/macros/s/AKfycbxrUGBlK1NlTe9jp0UbCadTENOSYn_T6sKoOG0-Mm1UYS7fDarneYsicvOdFQZ6hSAW/exec";

  const resp = await fetch(urlOcorrencias + "?action=consultar", {
    method: "POST",
    body: JSON.stringify({ sala, dataInicial, dataFinal })
  });

  const dados = await resp.json();

  const tbody = document.querySelector("#tabelaOcorrencias tbody");
  tbody.innerHTML = "";

  if (dados.length === 0) {
    tbody.innerHTML = "<tr><td colspan='9'>Nenhuma ocorrência encontrada.</td></tr>";
    return;
  }

  dados.forEach(o => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${o.dataFato}</td>
      <td>${o.horaFato}</td>
      <td>${o.ra}</td>
      <td>${o.nome}</td>
      <td>${o.sala}</td>
      <td>${o.tutor}</td>
      <td>${o.professor}</td>
      <td>${o.descricao}</td>
      <td>${o.acao}</td>
    `;
    tbody.appendChild(tr);
  });
}

// Carrega salas ao abrir a página
carregarSalas();
</script>
</body>
</html>
