<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Consulta de Ocorrências - Debug</title>
<style>
body { font-family: Arial; padding: 20px; background: #f4f4f4; }
.container { max-width: 900px; margin: auto; background: #fff; padding: 20px; border-radius: 10px; }
label { display: block; margin-top: 10px; font-weight: bold; }
select, input { width: 200px; padding: 5px; margin-top: 5px; }
button { margin-top: 15px; padding: 10px 20px; }
table { border-collapse: collapse; width: 100%; margin-top: 20px; }
th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
th { background-color: #eee; }
pre { background: #eee; padding: 10px; overflow: auto; }
</style>
</head>
<body>
<div class="container">
<h2>Consulta de Ocorrências - Debug</h2>

<label for="sala">Sala:</label>
<select id="sala">
  <option value="">Todas</option>
</select>

<label for="dataInicial">Data Inicial:</label>
<input type="date" id="dataInicial">

<label for="dataFinal">Data Final:</label>
<input type="date" id="dataFinal">

<button onclick="consultar()">Consultar</button>

<h3>Resultado bruto (debug)</h3>
<pre id="debug"></pre>

<div id="resultado"></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxw8nHg3ZQ8MzzphvR5cIdlB_1DQ6MVtRfnE3KZLSRvzwtJlsd18KapclXqaEdp7CKk/exec";

// Puxar salas únicas
async function carregarSalas() {
  try {
    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({ action: "salas" })
    });
    const salas = await res.json();
    const select = document.getElementById("sala");
    salas.forEach(s => {
      const option = document.createElement("option");
      option.value = s;
      option.textContent = s;
      select.appendChild(option);
    });
    document.getElementById("debug").textContent = "Salas carregadas: " + JSON.stringify(salas, null, 2);
  } catch(err) {
    console.error("Erro ao carregar salas:", err);
    document.getElementById("debug").textContent = "Erro ao carregar salas: " + err;
  }
}

// Converte yyyy-mm-dd -> dd/MM/yyyy
function formatarDataInput(data) {
  if (!data) return "";
  const [y,m,d] = data.split("-");
  return `${d}/${m}/${y}`;
}

async function consultar() {
  const sala = document.getElementById("sala").value;
  const dataInicial = formatarDataInput(document.getElementById("dataInicial").value);
  const dataFinal = formatarDataInput(document.getElementById("dataFinal").value);

  try {
    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "consultar",
        sala,
        dataInicial,
        dataFinal
      })
    });
    const dados = await res.json();
    const div = document.getElementById("resultado");
    div.innerHTML = "";
    
    // Debug: mostrar dados brutos
    document.getElementById("debug").textContent = JSON.stringify(dados, null, 2);

    if (!dados.length) {
      div.textContent = "Nenhuma ocorrência encontrada.";
      return;
    }

    // Criar tabela
    const table = document.createElement("table");
    const header = ["Data do Fato","Hora do Fato","RA","Nome","Sala","Tutor","Professor","Descrição","Ação Tomada"];
    const thead = document.createElement("thead");
    const trHead = document.createElement("tr");
    header.forEach(h => { const th = document.createElement("th"); th.textContent = h; trHead.appendChild(th); });
    thead.appendChild(trHead);
    table.appendChild(thead);

    const tbody = document.createElement("tbody");
    dados.forEach(d => {
      const tr = document.createElement("tr");
      header.forEach(h => {
        const td = document.createElement("td");
        td.textContent = d[h] || "";
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    div.appendChild(table);

  } catch(err) {
    console.error("Erro ao consultar ocorrências:", err);
    document.getElementById("resultado").textContent = "Erro ao consultar ocorrências.";
    document.getElementById("debug").textContent = err;
  }
}

// Inicializa
carregarSalas();
</script>
</body>
</html>
