<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Consulta de Ocorrências</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f4f4f4; }
    h1 { text-align: center; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; display: none; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; font-size: 14px; }
    th { background: #eee; }
    tr:nth-child(even) { background: #f9f9f9; }
    .error { color: red; text-align: center; margin-top: 20px; }
    .loading { text-align: center; font-weight: bold; }
  </style>
</head>
<body>

<h1>Consulta de Ocorrências 16</h1>
<div class="loading" id="loading">Carregando ocorrências...</div>
<div class="error" id="error"></div>

<table id="tabelaOcorrencias">
  <thead>
    <tr>
      <th>Data Registro</th>
      <th>Hora Registro</th>
      <th>RA</th>
      <th>Nome</th>
      <th>Sala</th>
      <th>Tutor</th>
      <th>Professor</th>
      <th>Descrição</th>
      <th>Ação Tomada</th>
      <th>Data do Fato</th>
      <th>Hora do Fato</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
  const urlWebApp = "https://script.google.com/macros/s/AKfycby8ee_iqmJuTW7oTYCbL064ITYLJ74h-U6F3gDkT28j9BKf6tq6sSmFsZ7d5vS4so4/exec";
  const tabela = document.getElementById("tabelaOcorrencias");
  const tbody = tabela.querySelector("tbody");
  const errorDiv = document.getElementById("error");
  const loadingDiv = document.getElementById("loading");

  // Função de callback chamada pelo JSONP
  function mostrarOcorrencias(dados) {
    loadingDiv.style.display = "none";

    if (!Array.isArray(dados) || dados.length === 0) {
      errorDiv.textContent = "Nenhuma ocorrência encontrada.";
      return;
    }

    dados.forEach(o => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${o["Data Registro"] || ""}</td>
        <td>${o["Hora Registro"] || ""}</td>
        <td>${o.ra || ""}</td>
        <td>${o.nome || ""}</td>
        <td>${o.Sala || ""}</td>
        <td>${o.Tutor || ""}</td>
        <td>${o.Professor || ""}</td>
        <td>${o["Descrição"] || ""}</td>
        <td>${o["Ação Tomada"] || ""}</td>
        <td>${o["Data do Fato"] || ""}</td>
        <td>${o["Hora do Fato"] || ""}</td>
      `;
      tbody.appendChild(tr);
    });

    tabela.style.display = "table";
  }

  // Carrega dados via JSONP
  function carregarOcorrencias() {
    const script = document.createElement("script");
    script.src = urlWebApp + "?action=consultar&callback=mostrarOcorrencias";
    script.onerror = () => {
      loadingDiv.style.display = "none";
      errorDiv.textContent = "Erro ao carregar ocorrências.";
    };
    document.body.appendChild(script);
  }

  // Executa ao carregar a página
  carregarOcorrencias();
</script>

</body>
</html>
