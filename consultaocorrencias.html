<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Consulta de Ocorrências</title>
<style>
  body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; }
  .container { max-width: 900px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1);}
  h1 { text-align: center; color: #333; }
  form { margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
  label { display: block; font-weight: bold; margin-bottom: 5px; }
  select, input[type="date"], button { padding: 6px 10px; font-size: 14px; }
  button { cursor: pointer; background: #4CAF50; color: #fff; border: none; border-radius: 4px; }
  button:hover { background: #45a049; }
  table { width: 100%; border-collapse: collapse; margin-top: 20px; }
  th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
  th { background-color: #f2f2f2; }
  .loading { text-align: center; color: #555; margin-top: 20px; }
</style>
</head>
<body>
<div class="container">
  <h1>Consulta de Ocorrências 13</h1>
  <form id="formConsulta">
    <div>
      <label for="sala">Sala:</label>
      <select id="sala"><option value="">Todas as salas</option></select>
    </div>
    <div>
      <label for="dataInicial">Data Inicial:</label>
      <input type="date" id="dataInicial">
    </div>
    <div>
      <label for="dataFinal">Data Final:</label>
      <input type="date" id="dataFinal">
    </div>
    <div>
      <button type="submit">Consultar</button>
    </div>
  </form>
  <div class="loading" id="loading" style="display:none;">Carregando...</div>
  <table id="tabelaResultados" style="display:none;">
    <thead>
      <tr>
        <th>Data Registro</th>
        <th>Hora Registro</th>
        <th>RA</th>
        <th>Nome</th>
        <th>Sala</th>
        <th>Tutor</th>
        <th>Professor</th>
        <th>Descrição</th>
        <th>Ação Tomada</th>
        <th>Data do Fato</th>
        <th>Hora do Fato</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwqkzJ35rcbPFkWA52M7wEZkSJYDAe-FfkD0qDvIFYbHwqgybvcO9WKF4L6SSYqohc/exec";

async function carregarSalas() {
  try {
    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "salas" })
    });
    const salas = await res.json();
    const select = document.getElementById("sala");
    salas.forEach(s => {
      const opt = document.createElement("option");
      opt.value = s;
      opt.textContent = s;
      select.appendChild(opt);
    });
  } catch (err) {
    console.error(err);
    const select = document.getElementById("sala");
    select.innerHTML = '<option value="">Erro ao carregar salas</option>';
  }
}

async function consultarOcorrencias(event) {
  event.preventDefault();
  const tabela = document.getElementById("tabelaResultados");
  const tbody = tabela.querySelector("tbody");
  const loading = document.getElementById("loading");

  const sala = document.getElementById("sala").value;
  const dataInicial = document.getElementById("dataInicial").value;
  const dataFinal = document.getElementById("dataFinal").value;

  tbody.innerHTML = "";
  tabela.style.display = "none";
  loading.style.display = "block";

  try {
    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        action: "consultar",
        sala: sala,
        dataInicial: dataInicial,
        dataFinal: dataFinal
      })
    });
    const dados = await res.json();

    if (dados.length === 0) {
      tbody.innerHTML = `<tr><td colspan="11" style="text-align:center;">Nenhuma ocorrência encontrada.</td></tr>`;
    } else {
      dados.forEach(o => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${o["Data Registro"] || ""}</td>
          <td>${o["Hora Registro"] || ""}</td>
          <td>${o.ra || ""}</td>
          <td>${o.nome || ""}</td>
          <td>${o.Sala || ""}</td>
          <td>${o.Tutor || ""}</td>
          <td>${o.Professor || ""}</td>
          <td>${o["Descrição"] || ""}</td>
          <td>${o["Ação Tomada"] || ""}</td>
          <td>${o["Data do Fato"] || ""}</td>
          <td>${o["Hora do Fato"] || ""}</td>
        `;
        tbody.appendChild(tr);
      });
    }
    tabela.style.display = "table";
  } catch (err) {
    console.error(err);
    tbody.innerHTML = `<tr><td colspan="11" style="text-align:center;color:red;">Erro ao consultar ocorrências.</td></tr>`;
    tabela.style.display = "table";
  } finally {
    loading.style.display = "none";
  }
}

document.getElementById("formConsulta").addEventListener("submit", consultarOcorrencias);
window.addEventListener("load", carregarSalas);
</script>
</body>
</html>
