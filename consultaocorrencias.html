<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Consulta de Ocorrências 5</title>
<style>
  body { font-family: Arial; background: #f4f4f4; padding: 20px; }
  .container { max-width: 900px; margin: auto; background: #fff; padding: 20px; border-radius: 10px; }
  h1 { text-align: center; }
  label { display: block; margin-top: 15px; font-weight: bold; }
  select, input { width: 100%; padding: 8px; margin-top: 5px; }
  button { margin-top: 20px; padding: 10px 20px; font-size: 16px; cursor: pointer; }
  table { width: 100%; border-collapse: collapse; margin-top: 20px; }
  th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
  th { background: #eee; }
</style>
</head>
<body>
<div class="container">
  <h1>Consulta de Ocorrências</h1>
  
  <label for="sala">Selecione a Sala:</label>
  <select id="sala">
    <option value="">Todas as salas</option>
  </select>

  <label for="dataInicial">Data Inicial:</label>
  <input type="date" id="dataInicial">

  <label for="dataFinal">Data Final:</label>
  <input type="date" id="dataFinal">

  <button onclick="consultar()">Consultar</button>

  <table id="tabelaResultados">
    <thead>
      <tr>
        <th>Data Registro</th>
        <th>Hora Registro</th>
        <th>RA</th>
        <th>Nome</th>
        <th>Sala</th>
        <th>Tutor</th>
        <th>Professor</th>
        <th>Descrição</th>
        <th>Ação</th>
        <th>Data do Fato</th>
        <th>Hora do Fato</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
const urlAppScript = "https://script.google.com/macros/s/AKfycbyXDTEXpEABjwBGiffM_J1hlX6vE-2-apt_0dvveRaLgoUE8wIZ3WoVMa9o7lNEVx0H/exec";

// Carregar salas
async function carregarSalas() {
  try {
    const res = await fetch(urlAppScript, {
      method: "POST",
      body: JSON.stringify({ action: "salas" })
    });
    const salas = await res.json();
    const select = document.getElementById("sala");
    salas.forEach(s => {
      const option = document.createElement("option");
      option.value = s;
      option.textContent = s;
      select.appendChild(option);
    });
  } catch (err) {
    console.error("Erro ao carregar salas:", err);
  }
}

async function consultar() {
  const sala = document.getElementById("sala").value;
  const dataInicial = document.getElementById("dataInicial").value;
  const dataFinal = document.getElementById("dataFinal").value;

  try {
    const res = await fetch(urlAppScript, {
      method: "POST",
      body: JSON.stringify({ action: "consultar", sala, dataInicial, dataFinal })
    });
    const resultado = await res.json();

    const tbody = document.querySelector("#tabelaResultados tbody");
    tbody.innerHTML = "";

    if (resultado.length === 0) {
      tbody.innerHTML = "<tr><td colspan='11'>Nenhuma ocorrência encontrada.</td></tr>";
      return;
    }

    resultado.forEach(o => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${o["Data Registro"]}</td>
        <td>${o["Hora Registro"]}</td>
        <td>${o.ra}</td>
        <td>${o.nome}</td>
        <td>${o.Sala}</td>
        <td>${o.Tutor}</td>
        <td>${o.Professor}</td>
        <td>${o["Descrição"]}</td>
        <td>${o["Ação Tomada"]}</td>
        <td>${o["Data do Fato"]}</td>
        <td>${o["Hora do Fato"]}</td>
      `;
      tbody.appendChild(tr);
    });
  } catch (err) {
    console.error("Erro ao consultar ocorrências:", err);
  }
}

// Carregar salas ao iniciar
carregarSalas();
</script>
</body>
</html>
