<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Consulta de Ocorrências 12</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; }
    .container { max-width: 900px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
    h1 { text-align: center; color: #333; }
    form { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; align-items: flex-end; }
    label { font-weight: bold; }
    select, input { padding: 6px 10px; border-radius: 4px; border: 1px solid #ccc; }
    button { padding: 8px 16px; border: none; border-radius: 4px; background: #2196F3; color: white; cursor: pointer; }
    button:hover { background: #1976D2; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { border: 1px solid #ccc; padding: 6px 10px; text-align: left; font-size: 14px; }
    th { background-color: #f2f2f2; }
    .status { margin-top: 12px; font-weight: bold; }
    .error { color: red; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Consulta de Ocorrências</h1>

    <form id="consultaForm">
      <div>
        <label for="sala">Sala:</label><br>
        <select id="sala" name="sala">
          <option value="">Carregando salas...</option>
        </select>
      </div>
      <div>
        <label for="dataInicial">Data Inicial:</label><br>
        <input type="date" id="dataInicial" name="dataInicial">
      </div>
      <div>
        <label for="dataFinal">Data Final:</label><br>
        <input type="date" id="dataFinal" name="dataFinal">
      </div>
      <div>
        <button type="submit">Consultar</button>
      </div>
    </form>

    <div class="status" id="status"></div>

    <table id="tabelaResultados">
      <thead>
        <tr>
          <th>Data Registro</th>
          <th>Hora Registro</th>
          <th>RA</th>
          <th>Nome</th>
          <th>Sala</th>
          <th>Tutor</th>
          <th>Professor</th>
          <th>Descrição</th>
          <th>Ação Tomada</th>
          <th>Data do Fato</th>
          <th>Hora do Fato</th>
        </tr>
      </thead>
      <tbody>
        <tr><td colspan="11" style="text-align:center;">Nenhum resultado</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwDmxHHLs7tuFlyQw3VRqg_Rrxr95X_JHHITgbJxrcfjCD95RscDKUNJ_k6F_53Inbp/exec";

    // Carrega salas únicas
    async function carregarSalas() {
      try {
        const res = await fetch(SCRIPT_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ action: "salas" })
        });
        const salas = await res.json();
        const select = document.getElementById("sala");
        select.innerHTML = '<option value="">Todas as salas</option>';
        salas.forEach(s => {
          const opt = document.createElement("option");
          opt.value = s;
          opt.textContent = s;
          select.appendChild(opt);
        });
      } catch (err) {
        console.error(err);
        const select = document.getElementById("sala");
        select.innerHTML = '<option value="">Erro ao carregar salas</option>';
      }
    }

    carregarSalas();

    // Consulta ocorrências
    document.getElementById("consultaForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const statusDiv = document.getElementById("status");
      const tbody = document.querySelector("#tabelaResultados tbody");
      statusDiv.textContent = "";
      tbody.innerHTML = '<tr><td colspan="11" style="text-align:center;">Carregando...</td></tr>';

      const data = {
        action: "consultar",
        sala: document.getElementById("sala").value,
        dataInicial: document.getElementById("dataInicial").value,
        dataFinal: document.getElementById("dataFinal").value
      };

      try {
        const res = await fetch(SCRIPT_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });
        const resultados = await res.json();
        tbody.innerHTML = "";

        if (resultados.length === 0) {
          tbody.innerHTML = '<tr><td colspan="11" style="text-align:center;">Nenhum resultado encontrado</td></tr>';
          return;
        }

        resultados.forEach(r => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${r["Data Registro"] || ""}</td>
            <td>${r["Hora Registro"] || ""}</td>
            <td>${r.ra || ""}</td>
            <td>${r.nome || ""}</td>
            <td>${r.Sala || ""}</td>
            <td>${r.Tutor || ""}</td>
            <td>${r.Professor || ""}</td>
            <td>${r["Descrição"] || ""}</td>
            <td>${r["Ação Tomada"] || ""}</td>
            <td>${r["Data do Fato"] || ""}</td>
            <td>${r["Hora do Fato"] || ""}</td>
          `;
          tbody.appendChild(tr);
        });
      } catch (err) {
        console.error(err);
        tbody.innerHTML = '<tr><td colspan="11" style="text-align:center;">Erro ao carregar dados</td></tr>';
        statusDiv.textContent = "Erro de conexão: " + err.message;
        statusDiv.className = "status error";
      }
    });
  </script>
</body>
</html>
