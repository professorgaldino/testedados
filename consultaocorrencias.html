<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Consulta de Ocorrências</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; }
label { display: block; margin-top: 10px; }
select, input { margin-top: 5px; padding: 5px; width: 200px; }
button { margin-top: 15px; padding: 10px 15px; }
table { border-collapse: collapse; margin-top: 20px; width: 100%; }
th, td { border: 1px solid #333; padding: 5px; text-align: left; }
#debug { margin-top: 20px; white-space: pre-wrap; background: #f0f0f0; padding: 10px; }
</style>
</head>
<body>

<h2>Consulta de Ocorrências 9</h2>

<label for="sala">Selecione a Sala:</label>
<select id="sala"><option value="">Carregando...</option></select>

<label for="dataInicial">Data Inicial:</label>
<input type="date" id="dataInicial">

<label for="dataFinal">Data Final:</label>
<input type="date" id="dataFinal">

<button id="consultar">Consultar</button>

<h3>Resultados:</h3>
<div id="resultado"></div>

<h3>Debug JSON:</h3>
<div id="debug"></div>

<script>
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbyRzOZeSZ0AHi_os7tuNlOEdI4FOVya-lakiMA_0G5bffe05B5OvCOw7ZZx0EPDPzKk/exec";

// Função para carregar salas
async function carregarSalas() {
    const select = document.getElementById("sala");
    select.innerHTML = "<option value=''>Carregando...</option>";
    try {
        const response = await fetch(WEBAPP_URL, {
            method: "POST",
            body: JSON.stringify({ action: "salas" }),
            headers: { "Content-Type": "application/json" }
        });
        const salas = await response.json();
        select.innerHTML = "<option value=''>Todas</option>";
        salas.forEach(s => {
            const opt = document.createElement("option");
            opt.value = s;
            opt.textContent = s;
            select.appendChild(opt);
        });
    } catch (err) {
        select.innerHTML = "<option value=''>Erro ao carregar salas</option>";
        document.getElementById("debug").textContent = "Erro ao carregar salas: " + err;
    }
}

// Função para consultar ocorrências
async function consultarOcorrencias() {
    const sala = document.getElementById("sala").value;
    const dataInicial = document.getElementById("dataInicial").value;
    const dataFinal = document.getElementById("dataFinal").value;

    document.getElementById("resultado").innerHTML = "Consultando...";
    document.getElementById("debug").textContent = "";

    try {
        const response = await fetch(WEBAPP_URL, {
            method: "POST",
            body: JSON.stringify({
                action: "consultar",
                sala: sala,
                dataInicial: dataInicial,
                dataFinal: dataFinal
            }),
            headers: { "Content-Type": "application/json" }
        });
        const ocorrencias = await response.json();
        document.getElementById("debug").textContent = JSON.stringify(ocorrencias, null, 2);

        if (ocorrencias.length === 0) {
            document.getElementById("resultado").innerHTML = "<p>Nenhuma ocorrência encontrada.</p>";
            return;
        }

        // Monta tabela
        let html = "<table><thead><tr>";
        const cols = Object.keys(ocorrencias[0]);
        cols.forEach(c => html += `<th>${c}</th>`);
        html += "</tr></thead><tbody>";
        ocorrencias.forEach(o => {
            html += "<tr>";
            cols.forEach(c => html += `<td>${o[c]}</td>`);
            html += "</tr>";
        });
        html += "</tbody></table>";
        document.getElementById("resultado").innerHTML = html;

    } catch (err) {
        document.getElementById("resultado").innerHTML = "<p>Erro ao consultar ocorrências.</p>";
        document.getElementById("debug").textContent = "Erro ao consultar: " + err;
    }
}

// Eventos
document.getElementById("consultar").addEventListener("click", consultarOcorrencias);

// Carrega salas ao abrir a página
carregarSalas();
</script>

</body>
</html>
